<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>KARDS 设置</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="theme.css">
<style>
  .wrap { max-width: 760px; margin: 0 auto; }
  .section {
    padding: 26px 30px; margin-bottom: 22px;
  }
  .section h2 {
    border-left: 3px solid var(--accent); padding-left: 10px;
  }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 2px; }
  .row { display: flex; gap: 10px; align-items: center; }
  .msg { font-size: 13px; min-height: 18px; margin-top: 4px; }
  .msg.err { color: #e57373; }
  .msg.ok { color: #8bc34a; }
  .btn.danger { color: #ff8a8a; border-color: #6a3a3a; }
  .btn.danger:hover:not(:disabled) { background: #3a1a1a; }
  table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--panel-border); font-size: 13px; }
  th { color: var(--text-dim); font-weight: 500; letter-spacing: 2px; }
  td .role { color: var(--accent); }

  /* 主题选择 */
  .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-top: 14px; }
  .theme-card {
    padding: 16px; border-radius: 6px; cursor: pointer;
    border: 2px solid var(--panel-border);
    text-align: center; transition: all .2s;
  }
  .theme-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .theme-card.active { border-color: var(--accent); background: rgba(214,162,106,0.08); }
  .theme-card .theme-name { font-size: 14px; color: var(--text-bright); letter-spacing: 2px; margin-bottom: 6px; }
  .theme-card .theme-desc { font-size: 11px; color: var(--text-dim); }
  .theme-card .theme-preview {
    width: 100%; height: 40px; border-radius: 4px; margin-bottom: 10px;
    border: 1px solid rgba(128,128,128,0.2);
  }

  /* 退出按钮 */
  .logout-section {
    padding: 26px 30px; margin-bottom: 22px;
    text-align: center;
  }
  .logout-section .btn {
    width: 100%; max-width: 300px; height: 46px;
    font-size: 16px; letter-spacing: 6px;
    color: #ff8a8a; border-color: #6a3a3a;
  }
  .logout-section .btn:hover:not(:disabled) {
    background: #3a1a1a; border-color: #c64a4a; color: #fff;
  }

  .account-info {
    padding: 16px 20px; margin-bottom: 22px;
    display: flex; align-items: center; gap: 16px;
  }
  .account-info .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #8a6a2a);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #fff; font-weight: bold;
  }
  .account-info .details { flex: 1; }
  .account-info .details .name { font-size: 18px; color: var(--text-bright); letter-spacing: 2px; }
  .account-info .details .role-tag {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 11px; letter-spacing: 1px; margin-top: 4px;
    background: rgba(214,162,106,0.15); color: var(--accent);
    border: 1px solid rgba(214,162,106,0.3);
  }
</style>
</head>
<body>

<div class="side-nav">
  <a class="slot" href="deck.html" data-page="deck">卡 组</a>
  <a class="slot" href="recruit.html" data-page="recruit">公开招募</a>
  <a class="slot" href="diy.html" data-page="diy">限定寻访</a>
  <a class="slot" href="search.html" data-page="search">搜 索</a>
  <a class="slot" href="settings.html" data-page="settings">设 置</a>
</div>

<div class="topbar">
  <div class="topbar-left">
    <nav class="topbar-nav">
      <a href="deck.html" data-page="deck">卡组</a>
      <a href="recruit.html" data-page="recruit">公开招募</a>
      <a href="diy.html" data-page="diy">限定寻访</a>
      <a href="search.html" data-page="search">搜索</a>
    </nav>
  </div>
  <div class="topbar-right">
    <span id="who" class="topbar-name"></span>
    <a class="settings-btn active" href="settings.html" title="设置">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </a>
  </div>
</div>

<div class="page-main">
  <div class="wrap">
    <div id="loginRequired" style="display:none">
      <div class="section" style="text-align:center">
        <h2>请先登录</h2>
        <p class="info" style="margin:16px 0">登录后才能访问设置页面</p>
        <a class="btn primary" href="account.html" style="display:inline-block;text-decoration:none;line-height:42px;padding:0 30px">前往登录</a>
      </div>
    </div>

    <div id="settingsContent" style="display:none">
      <div class="account-info panel" id="accountInfo">
        <div class="avatar" id="avatarLetter">A</div>
        <div class="details">
          <div class="name" id="displayName">-</div>
          <span class="role-tag" id="roleTag">用户</span>
        </div>
      </div>

      <div class="section panel">
        <h2>主题外观</h2>
        <p class="info" style="margin-bottom:10px">选择界面主题风格</p>
        <div class="theme-grid" id="themeGrid">
          <div class="theme-card" data-theme="default">
            <div class="theme-preview" style="background:linear-gradient(135deg,#0c0c0e,#1a1a1e)"></div>
            <div class="theme-name">默认</div>
            <div class="theme-desc">经典暗色</div>
          </div>
          <div class="theme-card" data-theme="white">
            <div class="theme-preview" style="background:linear-gradient(135deg,#f0f0f0,#ffffff)"></div>
            <div class="theme-name">白色</div>
            <div class="theme-desc">简洁明亮</div>
          </div>
          <div class="theme-card" data-theme="frosted">
            <div class="theme-preview" style="background:linear-gradient(135deg,#0a0a12,#1a1a2e)"></div>
            <div class="theme-name">毛玻璃</div>
            <div class="theme-desc">通透质感</div>
          </div>
          <div class="theme-card" data-theme="liquid">
            <div class="theme-preview" style="background:linear-gradient(135deg,#0a0806,#2a1a0a)"></div>
            <div class="theme-name">弹性液态</div>
            <div class="theme-desc">温暖流光</div>
          </div>
        </div>
      </div>

      <div class="section panel">
        <h2>导航布局</h2>
        <p class="info" style="margin-bottom:10px">切换顶部横栏或左侧侧栏导航模式</p>
        <div class="theme-grid">
          <div class="theme-card" data-nav="topbar">
            <div class="theme-preview" style="background:linear-gradient(180deg,#333 12%,#222 12%);display:flex;align-items:flex-start;padding-top:6px;justify-content:center;gap:6px">
              <div style="width:30px;height:3px;background:#d6a26a;border-radius:1px"></div>
              <div style="width:30px;height:3px;background:#555;border-radius:1px"></div>
              <div style="width:30px;height:3px;background:#555;border-radius:1px"></div>
            </div>
            <div class="theme-name">顶部横栏</div>
            <div class="theme-desc">默认导航方式</div>
          </div>
          <div class="theme-card" data-nav="sidebar">
            <div class="theme-preview" style="background:linear-gradient(90deg,#2a2a2e 25%,#222 25%);display:flex;flex-direction:column;align-items:flex-start;padding:6px 4px;gap:3px">
              <div style="width:20px;height:3px;background:#d6a26a;border-radius:1px"></div>
              <div style="width:20px;height:3px;background:#555;border-radius:1px"></div>
              <div style="width:20px;height:3px;background:#555;border-radius:1px"></div>
            </div>
            <div class="theme-name">左侧侧栏</div>
            <div class="theme-desc">经典侧边导航</div>
          </div>
        </div>
      </div>

      <div class="section panel">
        <h2>功能 API 接入</h2>
        <div class="field">
          <label>公开招募 API 地址</label>
          <input class="input" id="apiBase" placeholder="http://110.42.63.235:8080" />
        </div>
        <div class="row">
          <button class="btn primary" id="btnSaveApi">保 存</button>
          <button class="btn" id="btnResetApi">恢复默认</button>
        </div>
        <div class="msg" id="apiMsg"></div>
      </div>

      <div class="section panel">
        <h2>限定寻访 API 接入</h2>
        <div class="field">
          <label>限定寻访 API 地址</label>
          <input class="input" id="diyApiBase" placeholder="http://192.168.10.100:8090" />
        </div>
        <div class="row">
          <button class="btn primary" id="btnSaveDiyApi">保 存</button>
          <button class="btn" id="btnResetDiyApi">恢复默认</button>
        </div>
        <div class="msg" id="diyApiMsg"></div>
      </div>

      <div class="section panel">
        <h2>修改密码</h2>
        <div class="field"><label>原密码</label><input class="input" id="oldPwd" type="password" /></div>
        <div class="field"><label>新密码</label><input class="input" id="newPwd" type="password" /></div>
        <div class="field"><label>确认新密码</label><input class="input" id="newPwd2" type="password" /></div>
        <button class="btn primary" id="btnChangePwd">修 改</button>
        <div class="msg" id="pwdMsg"></div>
      </div>

      <div class="section panel" id="adminSection" style="display:none">
        <h2>账号管理 (仅管理员)</h2>
        <table>
          <thead><tr><th>用户名</th><th>UID</th><th>角色</th><th>注册时间</th><th>操作</th></tr></thead>
          <tbody id="userTable"></tbody>
        </table>
      </div>

      <div class="logout-section panel">
        <button class="btn" id="btnLogout">退出登录</button>
      </div>
    </div>
  </div>
</div>

<script src="account.js"></script>
<script>
const $ = (s) => document.querySelector(s);

function renderUserTable() {
  const cur = KardsAccount.getCurrentAccount();
  if (!cur || !cur.isAdmin) { $("#adminSection").style.display = "none"; return; }
  $("#adminSection").style.display = "";
  const tbody = $("#userTable");
  tbody.innerHTML = "";
  KardsAccount.listAll().forEach(a => {
    const tr = document.createElement("tr");
    tr.innerHTML =
      '<td>' + a.username + '</td>' +
      '<td>' + (a.uid || '<span style="color:#888">未绑定</span>') + '</td>' +
      '<td>' + (a.isAdmin ? '<span class="role">管理员</span>' : '用户') + '</td>' +
      '<td>' + new Date(a.createdAt).toLocaleString() + '</td>' +
      '<td>' + (a.username === cur.username ? '' : '<button class="btn danger" data-del="' + a.username + '">删除</button>') + '</td>';
    tbody.appendChild(tr);
  });
  tbody.querySelectorAll("[data-del]").forEach(b => {
    b.addEventListener("click", async () => {
      const target = b.dataset.del;
      if (!confirm("确认删除账号 " + target + " ?")) return;
      const pwd = prompt("请输入你的管理员密码以确认:");
      if (pwd === null) return;
      const me = KardsAccount.getCurrentAccount();
      if (!me || (await KardsAccount.sha256(pwd)) !== me.pwdHash) {
        alert("密码错误");
        return;
      }
      KardsAccount.deleteAccount(target);
      renderUserTable();
    });
  });
}

(async function init() {
  await KardsAccount.ensureSeed();
  const cur = KardsAccount.getCurrentAccount();
  KardsAccount.initPageNav("settings");

  if (!cur) {
    $("#loginRequired").style.display = "";
    return;
  }
  $("#settingsContent").style.display = "";
  $("#displayName").textContent = cur.username;
  $("#roleTag").textContent = cur.isAdmin ? "管理员" : "用户";
  $("#avatarLetter").textContent = cur.username.charAt(0).toUpperCase();

  const s = KardsAccount.loadSettings();
  const currentTheme = s.theme || "default";
  const currentNav = s.navMode || "topbar";

  document.querySelectorAll("[data-theme]").forEach(c => {
    c.classList.toggle("active", c.dataset.theme === currentTheme);
  });
  document.querySelectorAll("[data-nav]").forEach(c => {
    c.classList.toggle("active", c.dataset.nav === currentNav);
  });

  $("#apiBase").value = s.apiBase || KardsAccount.DEFAULT_API;
  $("#diyApiBase").value = s.diyApiBase || KardsAccount.DEFAULT_DIY_API;
  renderUserTable();
})();

document.querySelectorAll("[data-theme]").forEach(card => {
  card.addEventListener("click", () => {
    const theme = card.dataset.theme;
    if (!theme) return;
    document.querySelectorAll("[data-theme]").forEach(c => c.classList.remove("active"));
    card.classList.add("active");
    if (!theme || theme === "default") document.documentElement.removeAttribute("data-theme");
    else document.documentElement.setAttribute("data-theme", theme);
    const cur = KardsAccount.loadSettings();
    KardsAccount.saveSettings({ ...cur, theme });
  });
});

document.querySelectorAll("[data-nav]").forEach(card => {
  card.addEventListener("click", () => {
    const nav = card.dataset.nav;
    if (!nav) return;
    document.querySelectorAll("[data-nav]").forEach(c => c.classList.remove("active"));
    card.classList.add("active");
    if (nav === "sidebar") document.body.setAttribute("data-nav", "sidebar");
    else document.body.removeAttribute("data-nav");
    const cur = KardsAccount.loadSettings();
    KardsAccount.saveSettings({ ...cur, navMode: nav });
  });
});

$("#btnSaveApi").addEventListener("click", () => {
  const v = $("#apiBase").value.trim();
  if (!/^https?:\/\//.test(v)) { $("#apiMsg").className = "msg err"; $("#apiMsg").textContent = "请输入合法的 http(s):// 地址"; return; }
  const cur = KardsAccount.loadSettings();
  KardsAccount.saveSettings({ ...cur, apiBase: v.replace(/\/+$/, "") });
  $("#apiMsg").className = "msg ok"; $("#apiMsg").textContent = "已保存";
});
$("#btnResetApi").addEventListener("click", () => {
  const cur = KardsAccount.loadSettings();
  KardsAccount.saveSettings({ ...cur, apiBase: KardsAccount.DEFAULT_API });
  $("#apiBase").value = KardsAccount.DEFAULT_API;
  $("#apiMsg").className = "msg ok"; $("#apiMsg").textContent = "已恢复默认";
});
$("#btnSaveDiyApi").addEventListener("click", () => {
  const v = $("#diyApiBase").value.trim();
  if (!/^https?:\/\//.test(v)) { $("#diyApiMsg").className = "msg err"; $("#diyApiMsg").textContent = "请输入合法的 http(s):// 地址"; return; }
  const cur = KardsAccount.loadSettings();
  KardsAccount.saveSettings({ ...cur, diyApiBase: v.replace(/\/+$/, "") });
  $("#diyApiMsg").className = "msg ok"; $("#diyApiMsg").textContent = "已保存";
});
$("#btnResetDiyApi").addEventListener("click", () => {
  const cur = KardsAccount.loadSettings();
  KardsAccount.saveSettings({ ...cur, diyApiBase: KardsAccount.DEFAULT_DIY_API });
  $("#diyApiBase").value = KardsAccount.DEFAULT_DIY_API;
  $("#diyApiMsg").className = "msg ok"; $("#diyApiMsg").textContent = "已恢复默认";
});

$("#btnChangePwd").addEventListener("click", async () => {
  $("#pwdMsg").className = "msg"; $("#pwdMsg").textContent = "";
  const op = $("#oldPwd").value, np = $("#newPwd").value, np2 = $("#newPwd2").value;
  if (!op || !np) { $("#pwdMsg").className = "msg err"; $("#pwdMsg").textContent = "请填写完整"; return; }
  if (np !== np2) { $("#pwdMsg").className = "msg err"; $("#pwdMsg").textContent = "两次新密码不一致"; return; }
  try {
    await KardsAccount.changePassword(op, np);
    $("#pwdMsg").className = "msg ok"; $("#pwdMsg").textContent = "密码已修改";
    $("#oldPwd").value = $("#newPwd").value = $("#newPwd2").value = "";
  } catch (e) {
    $("#pwdMsg").className = "msg err"; $("#pwdMsg").textContent = e.message;
  }
});

$("#btnLogout").addEventListener("click", () => {
  if (!confirm("确认退出登录?")) return;
  KardsAccount.logout();
  location.href = "account.html";
});
</script>
</body>
</html>
