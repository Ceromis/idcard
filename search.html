<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>KARDS 搜索</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="theme.css">
<style>
  .page-main {
    margin-left: 110px; margin-top: 48px;
    min-height: calc(100vh - 48px);
    padding: 30px 40px;
  }
  .notice {
    display: flex; align-items: center; justify-content: center;
    min-height: calc(100vh - 48px - 60px);
  }
  .notice-card {
    display: block;
    max-width: 720px; width: 100%;
    padding: 60px 70px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    color: var(--text);
    font-size: 20px; line-height: 2.0;
    letter-spacing: 2px; text-align: center;
    text-decoration: none; cursor: pointer;
    transition: border-color .15s, transform .15s, box-shadow .15s, background .15s;
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
  }
  .notice-card:hover {
    border-color: var(--accent);
    background: rgba(214,162,106,0.06);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
  }
  .notice-card .lead { color: var(--text-dim); }
  .notice-card .link { color: var(--accent); text-decoration: underline; }
  .notice-card .hint { display: block; margin-top: 22px; font-size: 12px; color: var(--slot-text); letter-spacing: 4px; }
</style>
<script>
  // 早期应用主题/导航, 避免页面首次渲染时的主题闪烁
  (function() {
    try {
      var s = JSON.parse(localStorage.getItem("kards_settings") || "null");
      if (s) {
        if (s.theme && s.theme !== "default") document.documentElement.setAttribute("data-theme", s.theme);
        if (s.navMode === "sidebar") document.body.setAttribute("data-nav", "sidebar");
      }
    } catch (e) {}
  })();
</script></head>
<body>

<div class="side-nav">
  <a class="slot" href="deck.html" data-page="deck">卡 组</a>
  <a class="slot" href="recruit.html" data-page="recruit">公开招募</a>
  <a class="slot" href="diy.html" data-page="diy">限定寻访</a>
  <a class="slot" href="search.html" data-page="search">搜 索</a>
  <a class="slot" href="settings.html" data-page="settings">设 置</a>
</div>

<div class="topbar">
  <div class="topbar-left">
    <nav class="topbar-nav">
      <a href="deck.html" data-page="deck">卡组</a>
      <a href="recruit.html" data-page="recruit">公开招募</a>
      <a href="diy.html" data-page="diy">限定寻访</a>
      <a href="search.html" data-page="search">搜索</a>
    </nav>
  </div>
  <div class="topbar-right">
    <span id="who" class="topbar-name"></span>
    <a class="settings-btn" href="settings.html" title="设置">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </a>
  </div>
</div>

<div class="page-main">
  <div class="notice">
    <a class="notice-card" id="searchJump" href="https://1939.giaory.xyz" target="_blank" rel="noopener noreferrer">
      <span class="lead">本网站不制作搜索功能, 请使用</span>
      <span class="link">1939.giaory.xyz</span>
      <span class="lead">网站提供的网址功能</span>
      <span class="hint">点击整段文字任意位置跳转</span>
    </a>
  </div>
</div>

<script src="account.js"></script>
<script>
(async function() {
  await KardsAccount.ensureSeed();
  KardsAccount.initPageNav("search");
})();
</script>
</body>
</html>
