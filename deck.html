<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>KARDS 卡组</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="theme.css">
<style>
  .page-main.centered { display: flex; align-items: center; justify-content: center; }
  .wrap {
    width: 1300px; max-width: 100%;
    display: grid; grid-template-columns: 460px 1fr; gap: 60px;
    align-items: start;
  }
  .left { display: flex; flex-direction: column; align-items: center; gap: 30px; padding-top: 40px; }
  .label { font-size: 56px; letter-spacing: 4px; color: var(--text-bright); }
  .deck-input {
    width: 100%; height: 70px; padding: 0 14px;
    background: transparent; color: var(--text-bright);
    border: 2px solid var(--input-border); border-radius: 4px;
    font-size: 18px; text-align: center;
  }
  .deck-input:focus { outline: none; border-color: var(--accent); }
  .draw-btn {
    background: transparent; border: none; color: var(--text-bright);
    font-size: 44px; letter-spacing: 8px; cursor: pointer;
    padding: 10px 30px; transition: color .15s;
  }
  .draw-btn:hover { color: var(--accent); }
  .draw-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .right {
    display: flex; flex-direction: column; align-items: center; gap: 22px;
    padding: 30px 20px;
  }
  .deck-info {
    color: var(--text); font-size: 16px; letter-spacing: 2px;
    min-height: 24px; text-align: center;
  }
  .deck-info b { color: var(--accent); margin: 0 4px; }
  .img-box {
    width: 100%; min-height: 480px;
    background: var(--input-bg); border: 1px solid var(--input-border);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    overflow: hidden; padding: 10px;
  }
  .img-box img { max-width: 100%; max-height: 70vh; object-fit: contain; display: block; }
  .img-box .placeholder { color: var(--slot-text); font-size: 14px; letter-spacing: 4px; }
  .download {
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--text);
    padding: 10px 36px;
    font-size: 18px; letter-spacing: 6px; cursor: pointer;
    border-radius: 4px; transition: all .15s;
  }
  .download:hover:not(:disabled) {
    background: linear-gradient(#3a3a3f, #1f1f22);
    border-color: #6a6a72;
  }
  .download:disabled { opacity: 0.4; cursor: not-allowed; }
  .err { color: #e57373; font-size: 14px; min-height: 18px; }
  @media (max-width: 900px) {
    .wrap { grid-template-columns: 1fr; gap: 30px; }
  }
</style>
</head>
<body>

<div class="side-nav">
  <a class="slot" href="deck.html" data-page="deck">卡 组</a>
  <a class="slot" href="recruit.html" data-page="recruit">公开招募</a>
  <a class="slot" href="diy.html" data-page="diy">限定寻访</a>
  <a class="slot" href="search.html" data-page="search">搜 索</a>
  <a class="slot" href="settings.html" data-page="settings">设 置</a>
</div>

<div class="topbar">
  <div class="topbar-left">
    <nav class="topbar-nav">
      <a href="deck.html" data-page="deck">卡组</a>
      <a href="recruit.html" data-page="recruit">公开招募</a>
      <a href="diy.html" data-page="diy">限定寻访</a>
      <a href="search.html" data-page="search">搜索</a>
    </nav>
  </div>
  <div class="topbar-right">
    <span id="who" class="topbar-name"></span>
    <a class="settings-btn" href="settings.html" title="设置">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </a>
  </div>
</div>

<div class="page-main centered">
  <div class="wrap">
    <div class="left">
      <div class="label">请输入卡组码</div>
      <input class="deck-input" id="deckInput" type="text" placeholder="例如 %%15|...;...;..." />
      <button class="draw-btn" id="btnDraw">生 成</button>
      <div class="err" id="err"></div>
    </div>
    <div class="right">
      <div class="deck-info" id="info">尚未生成</div>
      <div class="img-box" id="imgBox"><div class="placeholder">卡组图将在此处显示</div></div>
      <button class="download" id="btnDownload" disabled>下 载</button>
    </div>
  </div>
</div>

<script src="account.js"></script>
<script>
let API_BASE = KardsAccount.DEFAULT_API;
const $ = (s) => document.querySelector(s);

(async function(){
  await KardsAccount.ensureSeed();
  KardsAccount.initPageNav("deck");
  API_BASE = KardsAccount.loadSettings().apiBase;
})();

const input = $("#deckInput");
const btnDraw = $("#btnDraw");
const btnDl = $("#btnDownload");
const info = $("#info");
const imgBox = $("#imgBox");
const errEl = $("#err");
let currentDataUrl = "";
let currentFileName = "deck.jpg";

function setErr(msg) { errEl.textContent = msg || ""; }

async function drawDeck() {
  const code = input.value.trim();
  if (!code) { setErr("请输入卡组码"); return; }
  setErr(""); btnDraw.disabled = true; btnDl.disabled = true;
  info.textContent = "生成中...";
  try {
    const resp = await fetch(API_BASE + "/api/kards/draw_deck", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ deck_code: code }) });
    const data = await resp.json();
    if (data.status !== "success" || !data.data) { setErr(data.message || "生成失败"); info.textContent = "生成失败"; imgBox.innerHTML = '<div class="placeholder">卡组图将在此处显示</div>'; return; }
    const d = data.data;
    currentDataUrl = d.image_base64;
    imgBox.innerHTML = "";
    const img = document.createElement("img");
    img.src = d.image_base64; img.alt = "卡组图";
    imgBox.appendChild(img);
    info.innerHTML = '主国 <b>' + (d.major || "-") + '</b> · 次国 <b>' + (d.minor || "-") + '</b> · 卡数 <b>' + ((parseInt(d.card_count,10) || 0) + 1) + '</b>';
    currentFileName = "deck_" + (d.major || "kards").replace(/[^\w\u4e00-\u9fa5-]/g, "_") + ".jpg";
    btnDl.disabled = false;
  } catch (e) { setErr("网络错误: " + e.message); info.textContent = "生成失败"; }
  finally { btnDraw.disabled = false; }
}

function download() {
  if (!currentDataUrl) return;
  const a = document.createElement("a");
  a.href = currentDataUrl; a.download = currentFileName;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

btnDraw.addEventListener("click", drawDeck);
input.addEventListener("keydown", e => { if (e.key === "Enter") drawDeck(); });
btnDl.addEventListener("click", download);
input.focus();
</script>
</body>
</html>
