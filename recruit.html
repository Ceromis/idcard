<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>KARDS 公开招募</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="theme.css">
<style>
  .panel-main {
    width: 1100px; max-width: 100%; min-height: 560px;
    padding: 40px 60px; position: relative;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.6), 0 0 30px rgba(0,0,0,0.5);
  }
  .panel-inner { position: relative; z-index: 1; }
  .top-row { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; margin-bottom: 30px; }
  .tags { display: flex; flex-direction: column; gap: 14px; }
  .tag {
    height: 56px;
    border: 1px solid var(--panel-border);
    background: var(--panel-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; letter-spacing: 4px;
    cursor: pointer; user-select: none;
    transition: all .15s ease;
    color: var(--text);
  }
  .tag:hover { background: var(--hover-bg); }
  .tag.selected {
    background: linear-gradient(#3a2e1a, #1a1410);
    border-color: var(--accent);
    color: #f0d6a0;
    box-shadow: inset 0 0 12px rgba(214,162,106,0.3);
  }
  .tag.tag-senior.selected { color: #d4a44a; text-shadow: 0 0 6px rgba(212,164,74,0.45); }
  .tag.tag-highsenior.selected {
    color: #f7d684;
    background-clip: padding-box;
    -webkit-background-clip: text;
    background-image: linear-gradient(180deg, #6a4a18 0%, #c8961f 45%, #f5d77a 100%);
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 8px rgba(245,215,122,0.25);
  }
  .tag.disabled { opacity: 0.4; cursor: not-allowed; }
  .info-side { display: flex; flex-direction: column; gap: 24px; padding-top: 6px; }
  .duration { display: flex; align-items: baseline; gap: 16px; font-size: 22px; }
  .duration .label { color: var(--text-dim); }
  .duration .time { font-size: 30px; color: var(--text-bright); letter-spacing: 2px; }
  .bottom-row { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: end; }
  .refresh-meta { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .refresh-meta .small { color: var(--text-dim); font-size: 14px; }
  .refresh-meta .small b { color: var(--text-bright); font-weight: 500; }
  .start-side { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
  .ticket-row { display: flex; align-items: center; gap: 10px; color: var(--text); font-size: 18px; }
  .ticket-row .tickets { display: flex; gap: 6px; }
  .ticket-row img { width: 36px; height: 36px; object-fit: contain; }
  .recruit-btn {
    min-width: 220px; height: 52px;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--text);
    font-size: 22px; letter-spacing: 6px;
    cursor: pointer; transition: all .15s;
  }
  .recruit-btn:hover:not(:disabled) { background: linear-gradient(#3a3a3f, #1f1f22); border-color: #6a6a72; }
  .recruit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .recruit-btn.refresh { letter-spacing: 4px; }
  .toast {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    padding: 12px 24px; background: rgba(0,0,0,0.85);
    border: 1px solid var(--accent); color: #f0d6a0;
    border-radius: 4px; z-index: 200; font-size: 14px;
    opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.err { border-color: #e57373; color: #ffb4b4; }
  /* 招募多状态视图 */
  .recruit-stage {
    width: 1100px; max-width: 100%; min-height: 560px;
    padding: 40px 60px; position: relative;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.6), 0 0 30px rgba(0,0,0,0.5);
    display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
  }
  .recruit-stage .left-art {
    width: 100%; max-height: 480px; object-fit: contain; border-radius: 4px;
  }
  .recruit-stage .right-info {
    display: flex; flex-direction: column; gap: 18px;
  }
  .recruit-stage .right-info h2 {
    font-size: 24px; color: var(--accent); letter-spacing: 4px; margin-bottom: 6px;
  }
  .recruit-stage .meta-line {
    font-size: 16px; color: var(--text); letter-spacing: 1px; line-height: 1.8;
  }
  .recruit-stage .meta-line b {
    color: var(--text-bright); font-weight: 500;
  }
  .recruit-stage .recv-desc {
    color: var(--text-dim); font-size: 14px; line-height: 1.7;
  }
  .recruit-stage .bottom-action {
    display: flex; justify-content: flex-end; margin-top: 18px;
  }
  .recruit-stage .bottom-action .recruit-btn {
    min-width: 180px; height: 48px;
  }
  .recruit-stage .org-link {
    color: var(--accent); cursor: pointer; text-decoration: underline; font-size: 13px;
    margin-left: 6px;
  }
  .gate-overlay {
    position: fixed; top: 48px; left: 110px; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .gate-box {
    width: 420px; padding: 30px 36px;
    background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 6px;
    text-align: center;
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
  }
  .gate-box h2 { color: var(--accent); letter-spacing: 4px; margin-bottom: 18px; font-size: 22px; }
  .gate-box .input { width: 100%; height: 42px; margin-bottom: 10px; padding: 0 12px; background: var(--input-bg); color: var(--text); border: 1px solid var(--input-border); border-radius: 4px; text-align: center; font-size: 14px; }
  .gate-box .input:focus { outline: none; border-color: var(--accent); }
  .gate-box .err { color: #e57373; font-size: 13px; min-height: 18px; margin-bottom: 6px; }
  .gate-box button { width: 100%; height: 46px; margin-top: 4px; background: linear-gradient(#3a2e1a, #1a1410); color: #f0d6a0; border: 1px solid var(--accent); border-radius: 4px; font-size: 16px; letter-spacing: 6px; cursor: pointer; }
  .gate-box .meta { color: var(--text-dim); font-size: 12px; margin-top: 14px; }
  .gate-box .meta a { color: var(--accent); text-decoration: none; }
</style>
<script>
  // 早期应用主题/导航, 避免页面首次渲染时的主题闪烁
  (function() {

        if (s.navMode === "sidebar") document.body.setAttribute("data-nav", "sidebar");
      }
    } catch (e) {}
  })();
</script></head>

<div class="page-main" style="display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:0">
  <div class="panel panel-main" id="viewTags">
    <div class="panel-inner">
      <div class="top-row">
        <div class="tags" id="tags">
          <div class="tag" data-idx="0">--</div>
          <div class="tag" data-idx="1">--</div>
          <div class="tag" data-idx="2">--</div>

        <div class="info-side">

<!-- 招募中 (未完成) -->

</div></div>



<div class="gate-overlay" id="gateLogin" style="display:none">
  <div class="gate-box">

    <div class="err" id="gateLoginErr"></div>

<div class="gate-overlay" id="gateBind" style="display:none">
  <div class="gate-box">
    <h2>需先绑定公开招募 UID</h2>
    <div class="meta">将打开账号页面完成绑定, <a href="account.html" id="gateBindGo">前往</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="account.js"></script>
<script>
let API_BASE = KardsAccount.DEFAULT_API;
let UID = "";
const MAX_CHOICE = 3;
let currentTags = [];
let ticketCount = 0;
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

function showToast(msg, isErr) {
  const t = $("#toast"); t.textContent = msg;
  t.className = "toast show" + (isErr ? " err" : "");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.className = "toast", 2200);
}

function calcDurationFromTags(tags) {
  if (tags.includes("高级资深卡牌")) return 120;
  if (tags.includes("资深卡牌")) return 60;
  return 30;
}
function formatDuration(min) {
  const h = String(Math.floor(min / 60)).padStart(2, "0");
  const m = String(min % 60).padStart(2, "0");
  return h + ":" + m + ":00";
}

async function apiPost(path, body) {
  const res = await fetch(API_BASE + path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body || {}) });
  return await res.json();
}

function renderTags() {
  const nodes = $$(".tag");
  currentTags.forEach((name, i) => {
    const node = nodes[i]; if (!node) return;
    node.textContent = name || "--";
    node.classList.remove("selected", "disabled", "tag-senior", "tag-highsenior");
    if (!name) { node.classList.add("disabled"); return; }
    if (name === "高级资深卡牌") node.classList.add("tag-highsenior");
    else if (name === "资深卡牌") node.classList.add("tag-senior");
  });
  updateDuration();
}

function getSelected() {
  const sel = [];
  $$(".tag").forEach((n, i) => { if (n.classList.contains("selected") && currentTags[i]) sel.push(i); });
  return sel;
}

function updateDuration() {
  const sel = getSelected();
  if (sel.length === 0) { $("#durationTime").textContent = "00:00:00"; return; }
  const min = calcDurationFromTags(sel.map(i => currentTags[i]));
  $("#durationTime").textContent = formatDuration(min);
}

function renderTickets(n) {
  ticketCount = n || 0;
  const wrap = $("#tickets"); wrap.innerHTML = "";
  for (let i = 0; i < ticketCount; i++) {
    const img = document.createElement("img"); img.src = "jjc.png"; img.alt = "许可"; wrap.appendChild(img);
  }
}

$$(".tag").forEach(node => {
  node.addEventListener("click", () => {
    if (node.classList.contains("disabled") || !currentTags[+node.dataset.idx]) return;
    if (node.classList.contains("selected")) { node.classList.remove("selected"); }
    else {
      const sel = getSelected();
      if (sel.length >= MAX_CHOICE) { showToast("最多只能选择 " + MAX_CHOICE + " 个词条", true); return; }
      node.classList.add("selected");
    }
    updateDuration();
  });

});

$("#btnRefresh").addEventListener("click", async () => {
  const rem = parseInt($("#refreshRemaining").textContent || "0", 10);
  if (rem <= 0) { showToast("今日刷新次数已用完", true); return; }
  try {
    const resp = await apiPost("/kards/refresh_tags", { uid: UID });
    if (resp.code === 401) { showToast("请重新登录", true); location.href = "account.html"; return; }
    if (resp.code !== 0) { showToast(resp.msg || "刷新失败", true); return; }
    currentTags = resp.data.tags || [];
    $("#refreshRemaining").textContent = Math.max(0, (resp.data.refresh_limit || 3) - (resp.data.refresh_used || 0));
    $("#refreshLimit").textContent = resp.data.refresh_limit;
    renderTags(); showToast("词条已刷新");
  } catch (e) { showToast("网络错误: " + e.message, true); }
});

$("#btnStart").addEventListener("click", async () => {
  const sel = getSelected();
  if (sel.length === 0) { showToast("请至少选择 1 个词条", true); return; }
  if (currentTags.includes("高级资深卡牌") && !sel.some(i => currentTags[i] === "高级资深卡牌")) { showToast("不要你就给作者", true); return; }
  if (ticketCount <= 0) { showToast("没有可用的招募许可", true); return; }
  const choices = sel.map(i => String.fromCharCode(65 + i)).join("");
  try {
    const resp = await apiPost("/kards/start_recruit", { uid: UID, choices });
    if (resp.code === 401) { showToast("请重新登录", true); location.href = "account.html"; return; }
    if (resp.code !== 0) { showToast(resp.msg || "招募失败", true); return; }
    showToast("招募已开始，预计 " + formatDuration(resp.data.duration) + " 完成");    await pollRecruitStatus();
  } catch (e) { showToast("网络错误: " + e.message, true); }
});

let _loadUserInfoInflight = null;
function loadUserInfo() {
  if (_loadUserInfoInflight) return _loadUserInfoInflight;
  _loadUserInfoInflight = (async () => {
    try {
      const resp = await apiPost("/kards/user_info", { uid: UID });
      if (resp.code !== 0) return;
      currentTags = resp.data.tags || [];
      $("#refreshRemaining").textContent = Math.max(0, (resp.data.refresh_limit || 3) - (resp.data.refresh_times || 0));
      $("#refreshLimit").textContent = resp.data.refresh_limit;
      renderTickets(resp.data.tickets); renderTags(); updateDuration();
    } catch (e) {}
    finally { _loadUserInfoInflight = null; }
  })();
  return _loadUserInfoInflight;
}

function _lockRecruitUI(locked) {
  const panel = document.querySelector(".panel-main");
  if (panel) panel.style.opacity = locked ? "0.35" : "";
  const btns = ["btnRefresh", "btnStart"];
  for (const id of btns) { const el = document.getElementById(id); if (el) el.disabled = !!locked; }
  const tags = document.querySelectorAll(".tag");
  tags.forEach(t => { t.classList.toggle("disabled", !!locked); t.style.pointerEvents = locked ? "none" : ""; });
}
// ===== 招募状态机 =====let _pollTimer = null;let _currentView = "tags";const VIEWS = ["viewTags", "viewOngoing", "viewReady", "viewReceived"];function _showView(name) {  for (const v of VIEWS) { const el = document.getElementById(v); if (el) el.style.display = (v === name ? "" : "none"); }  _currentView = name;}function _parseDateTime(s) { if (!s) return null; const t = Date.parse(String(s).replace(" ", "T")); return isNaN(t) ? null : t; }function _enterRecruitState(data) {  if (!data || data.status === "无招募" || !data.status) { _showView("viewTags"); return; }  const startTs = _parseDateTime(data.start_time);  const finishTs = _parseDateTime(data.finish_time);  const now = Date.now();  if (data.status === "招募中") {    if (finishTs && now >= finishTs) {      // 时间到 -> 可领取      _showView("viewReady");    } else {      $("#ongoingStartTime").textContent = data.start_time || "--";      $("#ongoingFinishTime").textContent = data.finish_time || "--";      $("#ongoingRemainTime").textContent = (typeof data.remain_minutes === "number")        ? (data.remain_minutes + " 分钟后完成")        : (data.remain_text || "--");      _showView("viewOngoing");    }    return;  }  if (data.status === "已完成") { _showView("viewReady"); return; }  _showView("viewTags");}async function loadRecruitDetail() {  if (!UID) return null;  const resp = await apiPost("/kards/recruit_detail", { uid: UID });  if (resp.code === 401) { showToast("请重新登录", true); setTimeout(() => location.href = "account.html", 800); return null; }  if (resp.code !== 0) { showToast(resp.msg || "查询招募状态失败", true); return null; }  return resp.data || null;}async function pollRecruitStatus() {  const data = await loadRecruitDetail();  if (!data) return;  _enterRecruitState(data);}async function fetchRecruitResult() {  if (!UID) return null;  const resp = await apiPost("/kards/get_recruit_result", { uid: UID });  if (resp.code === 401) { showToast("请重新登录", true); setTimeout(() => location.href = "account.html", 800); return null; }  if (resp.code !== 0) { showToast(resp.msg || "领取失败", true); return null; }  return resp.data || null;}

async function initGate() {
  await KardsAccount.ensureSeed();
  const s = KardsAccount.loadSettings();
  API_BASE = s.apiBase;
  KardsAccount.initPageNav("recruit");
  const cur = KardsAccount.getCurrentAccount();
  if (!cur) { document.getElementById("gateLogin").style.display = "flex"; _lockRecruitUI(true); return; }
  if (!cur.uid) { document.getElementById("gateBind").style.display = "flex"; _lockRecruitUI(true); return; }
  UID = cur.uid;

  async function refreshOnVisible() {
    if (document.hidden) return;
    const c = KardsAccount.getCurrentAccount();
    if (!c || !c.uid) return;
    try { await pollRecruitStatus(); } catch (e) {}
  }
  document.addEventListener("visibilitychange", refreshOnVisible);
  window.addEventListener("pageshow", refreshOnVisible);
  window.addEventListener("focus", refreshOnVisible);
  // 首次进入: 直接拉一次详情, 决定默认进入哪个视图
  try { await Promise.all([pollRecruitStatus(), loadUserInfo()]); } catch (e) { try { await loadUserInfo(); } catch (_) {} }
  // 启动 30s 轮询
  if (_pollTimer) clearInterval(_pollTimer);
  _pollTimer = setInterval(() => { pollRecruitStatus().catch(() => {}); }, 30000);
}

// 领取: 先调 /kards/recruit_detail 看后端是否已有 result_card_id (幂等领取); 没有再调 /kards/get_recruit_result
function _renderReceivedView(data) {
  $("#recvCardName").textContent = data.card_name || "--";
  $("#recvCardRare").textContent = data.rare || "--";
  $("#recvCardCountry").textContent = data.country || "--";
  const org = KardsAccount.getOrganization();
  const orgEl = $("#recvCardOrg");
  const linkEl = $("#recvOrgLink");
  if (org) { orgEl.textContent = org; linkEl.style.display = "none"; }
  else { orgEl.textContent = "未设置"; linkEl.style.display = ""; }
  if (data.image_base64) {
    $("#recvCardImg").src = "data:image/png;base64," + data.image_base64;
  } else {
    $("#recvCardImg").removeAttribute("src");
  }
  _showView("viewReceived");
}
$("#btnReceive").addEventListener("click", async () => {
  const btn = $("#btnReceive");
  btn.disabled = true;
  try {
    // 1. 先拉详情: 若后端已是"已完成"且有 result_card_id, 直接渲染 (避免重复点击 / 刷新后再点时报"无招募")
    const detail = await loadRecruitDetail();
    if (detail && detail.status === "已完成" && detail.result_card_id) {
      _renderReceivedView({
        card_id: detail.result_card_id,
        card_name: detail.result_card_name,
        rare: detail.result_card_rare,
        country: detail.result_card_country,
        image_base64: detail.result_card_image,
      });
      return;
    }
    // 2. 否则正常调领取接口
    const data = await fetchRecruitResult();
    if (!data) return;
    _renderReceivedView(data);
  } catch (e) {
    showToast("网络错误: " + e.message, true);
  } finally {
    btn.disabled = false;
  }
});

// 确认接收: 回到词条面板, 重新拉新词条
$("#btnAckReceive").addEventListener("click", async () => {
  const btn = $("#btnAckReceive");
  btn.disabled = true;
  try {
    await loadUserInfo();
    if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
    _showView("viewTags");
    showToast("已确认接收");
  } finally {
    btn.disabled = false;
  }
});

initGate();

document.getElementById("btnGateLogin").addEventListener("click", async () => {
  document.getElementById("gateLoginErr").textContent = "";
  try {
    const acc = await KardsAccount.login({ email: document.getElementById("gateLoginEmail").value, pwd: document.getElementById("gateLoginPwd").value });
    if (!acc.uid) { document.getElementById("gateLogin").style.display = "none"; document.getElementById("gateBind").style.display = "flex"; }
    else { location.reload(); }
  } catch (e) { document.getElementById("gateLoginErr").textContent = e.message; }
});
document.getElementById("gateLoginPwd").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("btnGateLogin").click(); });
// (btnGateBind 已移除: HTML 里没有这个 id)
document.getElementById("gateBindGo").addEventListener("click", () => { location.href = "account.html"; });
// 实时监测登录/绑定状态: 一旦登录并绑定 UID, 自动解锁 (无需刷新)
const _gateObserver = setInterval(() => {
  const loginGate = document.getElementById("gateLogin");
  const bindGate = document.getElementById("gateBind");
  const c = KardsAccount.getCurrentAccount();
  if (!c) {
    if (loginGate && loginGate.style.display !== "flex") { loginGate.style.display = "flex"; _lockRecruitUI(true); }
    return;
  }
  if (!c.uid) {
    if (loginGate) loginGate.style.display = "none";
    if (bindGate && bindGate.style.display !== "flex") { bindGate.style.display = "flex"; _lockRecruitUI(true); }
    return;
  }
  if (loginGate) loginGate.style.display = "none";
  if (bindGate) bindGate.style.display = "none";
  _lockRecruitUI(false);
  UID = c.uid;
}, 1000);
window.addEventListener("beforeunload", () => clearInterval(_gateObserver));
</script>
</body>
