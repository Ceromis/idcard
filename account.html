﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>KARDS 账号</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="theme.css">
<style>
  .wrap {
    max-width: 560px; margin: 0 auto; padding: 36px 40px;
  }
  h2 { font-size: 24px; margin-bottom: 22px; letter-spacing: 4px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 2px; }
  .field .row { display: flex; gap: 8px; }
  .input.code { flex: 1; }
  .input[readonly] { color: var(--accent); letter-spacing: 2px; }
  .btn.primary {
    width: 100%; height: 46px; margin-top: 6px;
    font-size: 16px; letter-spacing: 6px;
  }
  .hint { color: var(--text-dim); font-size: 12px; margin-top: 4px; }
  .checkbox-row { display: flex; gap: 24px; padding: 6px 0; flex-wrap: wrap; }
  .check-item { display: inline-flex; align-items: center; gap: 6px; color: var(--text); font-size: 14px; cursor: pointer; letter-spacing: 1px; }
  .check-item input { cursor: pointer; accent-color: var(--accent); width: 16px; height: 16px; }
  .verify-card {
    margin-top: 10px; padding: 10px 12px;
    background: rgba(214,162,106,0.06); border: 1px solid rgba(214,162,106,0.3); border-radius: 4px;
  }
  .verify-card .label { font-size: 12px; color: var(--accent); letter-spacing: 2px; margin-bottom: 6px; }
  .verify-card .row { display: flex; gap: 8px; }
  .verify-card .input { flex: 1; text-align: left; padding-left: 12px; font-size: 13px; }
  .verify-card .status { font-size: 12px; color: var(--text-dim); margin-top: 6px; min-height: 16px; }
  .verify-card .status.ok { color: #8bc34a; }
  .verify-card .status.err { color: #e57373; }
  .verify-copy { height: 42px; padding: 0 14px; flex: 0 0 auto; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 12px; letter-spacing: 1px; margin-left: 8px;
  }
  .badge.ok { background: rgba(139,195,74,0.15); color: #8bc34a; border: 1px solid rgba(139,195,74,0.4); }
  .badge.warn { background: rgba(229,115,115,0.15); color: #e57373; border: 1px solid rgba(229,115,115,0.4); }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-bg.open { display: flex; }
  .modal {
    width: 360px; max-width: calc(100% - 32px);
    background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 6px;
    padding: 24px 26px;
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
  }
  .modal h2 { font-size: 18px; margin-bottom: 18px; letter-spacing: 4px; }
  .modal .field { margin-bottom: 12px; }
  .modal .btn.primary { margin-top: 4px; }
  .modal-link { color: var(--accent); cursor: pointer; font-size: 12px; }
  .modal-link:hover { text-decoration: underline; }

  .logged-view .wrap { max-width: 560px; }
  .not-logged-view .wrap { max-width: 400px; text-align: center; }
  .not-logged-view h2 { font-size: 28px; }
  .not-logged-view .btn-group { display: flex; gap: 12px; margin-top: 24px; }
  .not-logged-view .btn-group .btn { flex: 1; height: 46px; font-size: 16px; letter-spacing: 6px; }
</style>
<script>
  // 早期应用主题/导航, 避免页面首次渲染时的主题闪烁
  (function() {
    try {
      var s = JSON.parse(localStorage.getItem("kards_settings") || "null");
      if (s) {
        if (s.theme && s.theme !== "default") document.documentElement.setAttribute("data-theme", s.theme);
        if (s.navMode === "sidebar") document.body.setAttribute("data-nav", "sidebar");
      }
    } catch (e) {}
  })();
</script></head>
<body>

<div class="side-nav">
  <a class="slot" href="deck.html" data-page="deck">卡 组</a>
  <a class="slot" href="recruit.html" data-page="recruit">公开招募</a>
  <a class="slot" href="diy.html" data-page="diy">限定寻访</a>
  <a class="slot" href="search.html" data-page="search">搜 索</a>
  <a class="slot" href="settings.html" data-page="settings">设 置</a>
</div>

<div class="topbar">
  <div class="topbar-left">
    <nav class="topbar-nav">
      <a href="deck.html" data-page="deck">卡组</a>
      <a href="recruit.html" data-page="recruit">公开招募</a>
      <a href="diy.html" data-page="diy">限定寻访</a>
      <a href="search.html" data-page="search">搜索</a>
    </nav>
  </div>
  <div class="topbar-right">
    <span id="who" class="topbar-name"></span>
    <a class="settings-btn" href="settings.html" title="设置">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </a>
  </div>
</div>

<div class="page-main">
  <!-- 未登录 -->
  <div class="not-logged-view" id="notLoggedView">
    <div class="wrap panel" style="padding:50px 40px">
      <h2>KARDS</h2>
      <p style="color:var(--text-dim);margin-top:12px;font-size:14px;letter-spacing:2px">二战卡牌游戏配套站点</p>
      <div class="btn-group">
        <button class="btn primary" id="btnOpenLogin">登 录</button>
        <button class="btn" id="btnOpenRegister">注 册</button>
      </div>
    </div>
  </div>

  <!-- 已登录 -->
  <div class="logged-view" id="loggedView" style="display:none">
    <div class="wrap panel" style="padding:36px 40px">
      <h2>账号设置</h2>

      <div class="info" id="acctInfo">加载中...</div>

      <div class="section-title">公开招募 UID / 限定寻访 QQ</div>
      <div class="info">勾选要绑定的项, 点击 "获取校验码" 后在 QQ 群聊内发送提示的指令, 校验成功后自动绑定到当前账号.</div>

      <div class="field">
        <label>绑定用途 (可多选)</label>
        <div class="checkbox-row">
          <label class="check-item"><input type="checkbox" id="chkKards" checked /> 公开招募 UID</label>
          <label class="check-item"><input type="checkbox" id="chkDiy" checked /> 限定寻访 QQ</label>
        </div>
      </div>
      <button class="btn" id="btnGetBindCode" type="button" style="width:100%">获取校验码</button>
      <div id="verifyList" style="margin-top:12px"></div>
      <div class="hint" id="getCodeHint" style="margin-top:8px">点击 "获取校验码" 后, 这里会出现群内要发送的指令.</div>
      <div class="err" id="bindErr"></div>
      <div class="ok" id="bindOk"></div>

      <div class="section-title">解绑</div>
      <div class="field">
        <div class="row" style="gap:8px">
          <button class="btn" id="btnUnbindUid" type="button" style="flex:1" disabled>解绑公开招募 UID</button>
          <button class="btn" id="btnUnbindDiyQQ" type="button" style="flex:1" disabled>解绑限定寻访 QQ</button>
        </div>
      </div>
      <div class="err" id="unbindErr"></div>
      <div class="ok" id="unbindOk"></div>

      <div class="section-title">组织名称</div>
      <div class="info">当前组织: <span id="orgCur">未设置</span></div>
      <div class="field" style="margin-top:18px"><label>组织名称 (招募确认接收时显示, 1-20 字, 用户间不重名)</label><input class="input" id="orgInput" type="text" placeholder="如 罗德岛军备处" maxlength="20" /></div>
      <button class="btn primary" id="btnSaveOrg">保存组织名称</button>
      <div class="err" id="orgErr"></div>
      <div class="ok" id="orgOk"></div>

      <div class="section-title">邮箱 (可选)</div>
      <div class="info">当前邮箱: <span id="emailCur">未绑定</span></div>
      <div class="field" style="margin-top:18px"><label>邮箱地址</label><input class="input" id="emailInput" type="email" placeholder="your@email.com" /></div>
      <div class="field">
        <label>邮箱验证码</label>
        <div class="row">
          <input class="input code" id="emailCode" type="text" placeholder="6 位数字" maxlength="6" />
          <button class="btn" id="btnSendEmailCode">发送验证码</button>
        </div>
      </div>
      <button class="btn primary" id="btnBindEmail">绑定邮箱</button>
      <button class="btn" id="btnUnbindEmail" style="margin-top:8px;width:100%">解绑邮箱</button>
      <div class="err" id="emailErr"></div>
      <div class="ok" id="emailOk"></div>
    </div>
  </div>
</div>

<!-- 登录弹窗 -->
<div class="modal-bg" id="loginModal">
  <div class="modal">
    <h2>账号登录</h2>
    <div class="field"><label>账号 (用户名 / 邮箱)</label><input class="input" id="loginId" type="text" autocomplete="username" /></div>
    <div class="field"><label>密码</label><input class="input" id="loginPwd" type="password" autocomplete="current-password" /></div>
    <button class="btn primary" id="btnDoLogin">登 录</button>
    <div class="err" id="loginErr" style="margin-top:10px"></div>
    <div class="info" style="margin-top:14px">还没有账号? <span class="modal-link" id="linkToRegister">立即注册</span></div>
  </div>
</div>

<!-- 注册弹窗 -->
<div class="modal-bg" id="registerModal">
  <div class="modal">
    <h2>注册新账号</h2>
    <div class="field"><label>用户名</label><input class="input" id="regUsername" type="text" placeholder="3-20 位, 字母/数字/下划线" autocomplete="username" /></div>
    <div class="field"><label>密码</label><input class="input" id="regPwd" type="password" placeholder="6 位以上" autocomplete="new-password" /></div>
    <div class="field"><label>确认密码</label><input class="input" id="regPwd2" type="password" placeholder="再次输入" autocomplete="new-password" /></div>
    <button class="btn primary" id="btnDoRegister">注 册</button>
    <div class="err" id="regErr" style="margin-top:10px"></div>
    <div class="ok" id="regOk" style="margin-top:10px"></div>
    <div class="info" style="margin-top:14px">已有账号? <span class="modal-link" id="linkToLogin">前往登录</span></div>
  </div>
</div>

<script src="account.js"></script>
<script>
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

function showError(el, msg) { el.textContent = msg || ""; }
function showOk(el, msg) { el.textContent = msg || ""; }
function clearMsgs() { $$(".err, .ok").forEach(e => e.textContent = ""); }

function refreshTopbar() {
  const cur = KardsAccount.getCurrentAccount();
  $("#who").textContent = cur ? cur.username + (cur.isAdmin ? " (管理员)" : "") : "未登录";
}

function refreshAcctInfo() {
  const cur = KardsAccount.getCurrentAccount();
  if (!cur) return;
  const uidPart = cur.uid ? "公开招募 UID <b>" + cur.uid + "</b>" : '<span style="color:#e57373">公开招募 UID 未绑定</span>';
  const diyPart = cur.diyQQ ? "限定寻访 QQ <b>" + cur.diyQQ + "</b>" : '<span style="color:#e57373">限定寻访 QQ 未绑定</span>';
  $("#acctInfo").innerHTML = "账号 <b>" + cur.username + "</b> 当前状态: " + uidPart + " / " + diyPart;
  $("#btnUnbindUid").disabled = !cur.uid;
  $("#btnUnbindDiyQQ").disabled = !cur.diyQQ;
  $("#btnGetBindCode").disabled = false;
  $("#btnBindEmail").disabled = false;
  $("#btnSendEmailCode").disabled = false;
  $("#btnUnbindEmail").disabled = !cur.email;
}

function refreshEmailPane() {
  const cur = KardsAccount.getCurrentAccount();
  if (!cur) return;
  const el = $("#emailCur");
  if (cur.email) {
    el.innerHTML = cur.email + ' <span class="badge ok">已绑定</span>';
    $("#emailInput").value = cur.email;
  } else {
    el.innerHTML = '未绑定 <span class="badge warn">未验证</span>';
    $("#emailInput").value = "";
  }
}

function refreshOrgPane() {
  const cur = KardsAccount.getCurrentAccount();
  if (!cur) return;
  const org = KardsAccount.getOrganization();
  const el = $("#orgCur");
  if (org) {
    el.innerHTML = org + ' <span class="badge ok">已设置</span>';
    $("#orgInput").value = org;
  } else {
    el.innerHTML = '未设置 <span class="badge warn">未配置</span>';
    $("#orgInput").value = "";
  }
}

function showView(view) {
  if (view === "logged") {
    $("#notLoggedView").style.display = "none";
    $("#loggedView").style.display = "";
  } else {
    $("#notLoggedView").style.display = "";
    $("#loggedView").style.display = "none";
  }
}

// 弹窗
function openLoginModal() { $("#loginErr").textContent = ""; $("#loginPwd").value = ""; $("#loginModal").classList.add("open"); setTimeout(() => $("#loginId").focus(), 50); }
function openRegisterModal() { $("#regErr").textContent = ""; $("#regOk").textContent = ""; $("#regPwd").value = ""; $("#regPwd2").value = ""; $("#registerModal").classList.add("open"); setTimeout(() => $("#regUsername").focus(), 50); }
function closeLoginModal() { $("#loginModal").classList.remove("open"); }
function closeRegisterModal() { $("#registerModal").classList.remove("open"); }

$("#btnOpenLogin").addEventListener("click", openLoginModal);
$("#btnOpenRegister").addEventListener("click", openRegisterModal);
$("#linkToRegister").addEventListener("click", () => { closeLoginModal(); openRegisterModal(); });
$("#linkToLogin").addEventListener("click", () => { closeRegisterModal(); openLoginModal(); });
$("#loginModal").addEventListener("click", (e) => { if (e.target.id === "loginModal") closeLoginModal(); });
$("#registerModal").addEventListener("click", (e) => { if (e.target.id === "registerModal") closeRegisterModal(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeLoginModal(); closeRegisterModal(); } });

$("#btnDoLogin").addEventListener("click", async () => {
  const id = $("#loginId").value.trim();
  const pwd = $("#loginPwd").value;
  $("#loginErr").textContent = "";
  if (!id || !pwd) { $("#loginErr").textContent = "请输入账号和密码"; return; }
  try {
    await KardsAccount.login({ id, pwd });
    closeLoginModal();
    location.reload();
  } catch (e) { $("#loginErr").textContent = e.message; }
});
$("#loginPwd").addEventListener("keydown", (e) => { if (e.key === "Enter") $("#btnDoLogin").click(); });
$("#loginId").addEventListener("keydown", (e) => { if (e.key === "Enter") $("#loginPwd").focus(); });

$("#btnDoRegister").addEventListener("click", async () => {
  const username = $("#regUsername").value.trim();
  const pwd = $("#regPwd").value;
  const pwd2 = $("#regPwd2").value;
  $("#regErr").textContent = ""; $("#regOk").textContent = "";
  if (!username || !pwd) { $("#regErr").textContent = "请填写用户名和密码"; return; }
  if (pwd !== pwd2) { $("#regErr").textContent = "两次密码不一致"; return; }
  try {
    await KardsAccount.register({ username, pwd });
    $("#regOk").textContent = "注册成功, 正在登录...";
    await KardsAccount.login({ id: username, pwd });
    closeRegisterModal();
    location.reload();
  } catch (e) { $("#regErr").textContent = e.message; }
});
$("#regPwd2").addEventListener("keydown", (e) => { if (e.key === "Enter") $("#btnDoRegister").click(); });

// 绑定
function _setBindCooldown(btn) {
  let left = 60;
  const orig = btn.textContent;
  btn.disabled = true;
  const timer = setInterval(() => { left -= 1; btn.textContent = "等待校验 (" + left + "s)"; if (left <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = orig; } }, 1000);
}
function _formatCmd(token) { return "校验kards账号" + token; }

const BIND_PURPOSE_META = {
  kards_token_bind: { label: "公开招募 UID", bindFn: "bindUid" },
  diy_token_bind: { label: "限定寻访 QQ", bindFn: "bindDiyQQ" }
};

function _readCheckedPurposes() {
  return ["kards_token_bind", "diy_token_bind"].filter(p => {
    if (p === "kards_token_bind") return $("#chkKards").checked;
    if (p === "diy_token_bind") return $("#chkDiy").checked;
    return false;
  });
}

function _renderUnifiedCard(token, purposes) {
  const labels = purposes.map(p => BIND_PURPOSE_META[p] ? BIND_PURPOSE_META[p].label : p).join(" + ");
  const card = document.createElement("div");
  card.className = "verify-card";
  const cmd = _formatCmd(token);
  card.innerHTML = '<div class="label">在群内发送 (绑定: ' + labels + ')</div><div class="row"><input class="input" type="text" readonly value="' + cmd + '" /><button class="btn verify-copy" type="button">点我复制指令</button></div><div class="status">等待发送...</div>';
  const input = card.querySelector("input");
  const copyBtn = card.querySelector("button");
  copyBtn.addEventListener("click", async () => {
    try { await navigator.clipboard.writeText(input.value); copyBtn.textContent = "已复制"; setTimeout(() => { copyBtn.textContent = "点我复制指令"; }, 1200); }
    catch (e) { input.select(); input.setSelectionRange(0, 999); copyBtn.textContent = "请按 Ctrl+C"; setTimeout(() => { copyBtn.textContent = "点我复制指令"; }, 1500); }
  });
  $("#verifyList").appendChild(card);
  return card;
}

function _setCardStatus(card, text, cls) { const el = card.querySelector(".status"); el.textContent = text; el.className = "status" + (cls ? " " + cls : ""); }

function _doGetVerify() {
  clearMsgs();
  const cur = KardsAccount.getCurrentAccount();
  if (!cur) { showError($("#bindErr"), "请先登录"); return; }
  const purposes = _readCheckedPurposes();
  if (purposes.length === 0) { $("#getCodeHint").textContent = "请至少勾选一个绑定用途"; return; }
  $("#verifyList").innerHTML = "";
  const btn = $("#btnGetBindCode");
  _setBindCooldown(btn);
  const token = KardsAccount.generateVerifyToken();
  for (const purpose of purposes) KardsAccount.preallocVerifyToken(purpose, token);
  const card = _renderUnifiedCard(token, purposes);
  for (const purpose of purposes) {
    const meta = BIND_PURPOSE_META[purpose];
    KardsAccount.pollVerifyToken(purpose, token, {
      onFound: (item) => { try { KardsAccount[meta.bindFn](item.qq); _setCardStatus(card, meta.label + " 绑定成功: " + item.qq, "ok"); refreshAcctInfo(); } catch (e) { _setCardStatus(card, "绑定失败: " + e.message, "err"); } },
      onTimeout: (msg) => { _setCardStatus(card, msg + ", 请重新获取校验码", "err"); }
    });
  }
  $("#getCodeHint").textContent = "请在 600 秒内在群聊内发送以下指令";
}

$("#btnGetBindCode").addEventListener("click", _doGetVerify);
["chkKards", "chkDiy"].forEach(id => { $("#" + id).addEventListener("change", () => { $("#verifyList").innerHTML = ""; $("#getCodeHint").textContent = `点击 "获取校验码" 后, 这里会出现群内要发送的指令.`; }); });

function _doUnbind(which) {
  clearMsgs();
  const cur = KardsAccount.getCurrentAccount();
  if (!cur) { showError($("#unbindErr"), "请先登录"); return; }
  const meta = which === "uid" ? { label: "公开招募 UID", field: "uid" } : { label: "限定寻访 QQ", field: "diyQQ" };
  if (!cur[meta.field]) { showError($("#unbindErr"), "当前未绑定 " + meta.label); return; }
  if (!confirm("确认解绑 " + meta.label + ": " + cur[meta.field] + " ?")) return;
  try { KardsAccount[which === "uid" ? "unbindUid" : "unbindDiyQQ"](); showOk($("#unbindOk"), meta.label + " 已解绑"); refreshAcctInfo(); } catch (e) { showError($("#unbindErr"), e.message); }
}
$("#btnUnbindUid").addEventListener("click", () => _doUnbind("uid"));
$("#btnUnbindDiyQQ").addEventListener("click", () => _doUnbind("diy"));

$("#btnSendEmailCode").addEventListener("click", async () => {
  clearMsgs();
  const email = $("#emailInput").value.trim();
  if (!email) { showError($("#emailErr"), "请先填写邮箱"); return; }
  try {
    const r = await KardsAccount.sendCode(email, "bind");
    if (r && r.devCode) alert("SMTP 未启用, 验证码: " + r.devCode);
    else showOk($("#emailOk"), "验证码已发送");
  } catch (e) { showError($("#emailErr"), e.message); }
});
$("#btnBindEmail").addEventListener("click", async () => {
  clearMsgs();
  const email = $("#emailInput").value.trim();
  const code = $("#emailCode").value.trim();
  if (!email) { showError($("#emailErr"), "请填写邮箱"); return; }
  if (!code) { showError($("#emailErr"), "请输入验证码"); return; }
  try { KardsAccount.bindEmail(email, code); showOk($("#emailOk"), "邮箱绑定成功!"); refreshTopbar(); refreshEmailPane(); } catch (e) { showError($("#emailErr"), e.message); }
});
$("#btnSaveOrg").addEventListener("click", () => {
  $("#orgErr").textContent = ""; $("#orgOk").textContent = "";
  const v = $("#orgInput").value;
  try {
    KardsAccount.setOrganization(v);
    $("#orgOk").textContent = "组织名称已保存";
    refreshTopbar(); refreshOrgPane();
  } catch (e) { $("#orgErr").textContent = e.message; }
});

(async function init() {
  await KardsAccount.ensureSeed();
  const cur = KardsAccount.getCurrentAccount();
  KardsAccount.initPageNav("account");
  if (!cur) { showView("not"); return; }
  showView("logged");
  refreshAcctInfo();
  refreshEmailPane();
})();
</script>
</body>
</html>
