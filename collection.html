<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>KARDS 我的收藏</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="theme.css">
<style>
  .page-main.centered { padding: 30px 40px; }
  .col-wrap { width: 1100px; max-width: 100%; display: flex; flex-direction: column; gap: 14px; }
  .col-header {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--panel-bg); border: 1px solid var(--panel-border);
    border-radius: 6px; padding: 14px 22px;
    backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
  }
  .col-header .title { color: var(--accent); letter-spacing: 4px; font-size: 18px; }
  .col-header .count { color: var(--text-dim); font-size: 13px; letter-spacing: 1px; margin-left: 16px; }
  .col-header .count b { color: var(--accent); font-weight: 500; }
  .col-header .actions { display: flex; align-items: center; gap: 10px; }
  .col-header .refresh, .col-header .back {
    padding: 6px 14px; font-size: 13px; letter-spacing: 2px;
    color: var(--accent); background: transparent;
    border: 1px solid var(--accent); border-radius: 4px;
    cursor: pointer; transition: all .15s;
  }
  .col-header .refresh:hover, .col-header .back:hover { background: rgba(214,162,106,0.12); }
  .col-header .refresh:disabled { opacity: .5; cursor: wait; }
  .col-panel {
    background: var(--panel-bg); border: 1px solid var(--panel-border);
    border-radius: 6px; padding: 22px;
    min-height: 540px;
    backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
  }
  .my-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
  .my-card {
    position: relative; cursor: pointer;
    border: 1px solid transparent; border-radius: 4px;
    padding: 4px; transition: all .15s;
  }
  .my-card:hover { border-color: var(--accent); background: rgba(214,162,106,0.05); }
  .my-card img { width: 100%; aspect-ratio: 5/7; object-fit: contain; border-radius: 3px; display: block; }
  .my-card .name { font-size: 13px; color: var(--text); margin-top: 6px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .my-card .count-badge {
    position: absolute; top: 8px; right: 8px;
    min-width: 24px; height: 22px; padding: 0 7px;
    background: rgba(0,0,0,0.78); color: var(--accent);
    font-size: 12px; font-weight: 600; border-radius: 11px;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .empty { color: var(--text-dim); font-size: 14px; padding: 60px 10px; text-align: center; letter-spacing: 2px; }
  .toast {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    padding: 12px 24px; background: rgba(0,0,0,0.85);
    border: 1px solid var(--accent); color: #f0d6a0;
    border-radius: 4px; z-index: 200; font-size: 14px;
    opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.err { border-color: #e57373; color: #ffb4b4; }
  /* 抽屉 */
  .drawer {
    position: fixed; right: 0; top: 0; bottom: 0; width: 380px; max-width: 92vw;
    background: var(--panel-bg); border-left: 1px solid var(--panel-border);
    padding: 50px 22px 22px; transform: translateX(100%);
    transition: transform 0.3s ease; display: flex; flex-direction: column; gap: 12px;
    z-index: 50; overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.4);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 49; display: none; }
  .drawer-backdrop.open { display: block; }
  .drawer .drawer-close {
    position: absolute; top: 6px; right: 8px; width: 28px; height: 28px; padding: 0;
    background: transparent; color: var(--text-dim); border: none;
    font-size: 22px; line-height: 1; cursor: pointer;
  }
  .drawer .drawer-close:hover { color: var(--text-bright); }
  .drawer img { width: 100%; aspect-ratio: 5/7; object-fit: contain; border-radius: 4px; }
  .drawer h2 { font-size: 18px; color: var(--text-bright); letter-spacing: 2px; margin: 4px 0 0; text-align: center; }
  .drawer-meta { font-size: 13px; color: var(--text); letter-spacing: 1px; }
  .drawer-meta b { color: var(--accent); font-weight: 500; }
  .drawer .btn-primary { height: 40px; font-size: 15px; letter-spacing: 4px; margin-top: 6px; }
  .drawer-give-form {
    display: flex; flex-direction: column; gap: 8px;
    padding: 12px 10px; background: rgba(0,0,0,0.2);
    border-radius: 4px; margin-top: 6px;
  }
  .drawer-give-form label { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }
  .drawer-give-form .input { width: 100%; padding: 8px 10px; background: var(--input-bg); color: var(--text); border: 1px solid var(--input-border); border-radius: 4px; font-size: 13px; box-sizing: border-box; }
  .drawer-give-form .msg { font-size: 12px; min-height: 16px; }
  .drawer-give-form .msg.err { color: #e57373; }
  .gate-overlay { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.45); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .gate-box {
    width: 420px; padding: 30px 36px; background: var(--panel-bg);
    border: 1px solid var(--panel-border); border-radius: 6px;
    text-align: center; backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
  }
  .gate-box h2 { color: var(--accent); letter-spacing: 4px; margin-bottom: 18px; font-size: 22px; }
  .gate-box .input { width: 100%; height: 42px; margin-bottom: 10px; padding: 0 12px; background: var(--input-bg); color: var(--text); border: 1px solid var(--input-border); border-radius: 4px; text-align: center; font-size: 14px; }
  .gate-box .input:focus { outline: none; border-color: var(--accent); }
  .gate-box .err { color: #e57373; font-size: 13px; min-height: 18px; margin-bottom: 6px; }
  .gate-box button { width: 100%; height: 46px; margin-top: 4px; background: linear-gradient(#3a2e1a, #1a1410); color: #f0d6a0; border: 1px solid var(--accent); border-radius: 4px; font-size: 16px; letter-spacing: 6px; cursor: pointer; }
  .gate-box .meta { color: var(--text-dim); font-size: 12px; margin-top: 14px; }
  .gate-box .meta a { color: var(--accent); text-decoration: none; }
</style>
<script>
  (function() {
    try {
      var s = JSON.parse(localStorage.getItem("kards_settings") || "null");
      if (s) {
        if (s.theme && s.theme !== "default") document.documentElement.setAttribute("data-theme", s.theme);
        if (s.navMode === "sidebar") document.body.setAttribute("data-nav", "sidebar");
      }
    } catch (e) {}
  })();
</script>
</head>
<body>

<div class="side-nav">
  <a class="slot" href="deck.html" data-page="deck">卡 组</a>
  <a class="slot" href="recruit.html" data-page="recruit">公开招募</a>
  <a class="slot" href="diy.html" data-page="diy">限定寻访</a>
  <a class="slot" href="search.html" data-page="search">搜 索</a>
  <a class="slot" href="settings.html" data-page="settings">设 置</a>
</div>

<div class="topbar">
  <div class="topbar-left">
    <nav class="topbar-nav">
      <a href="deck.html" data-page="deck">卡组</a>
      <a href="recruit.html" data-page="recruit">公开招募</a>
      <a href="diy.html" data-page="diy">限定寻访</a>
      <a href="search.html" data-page="search">搜索</a>
    </nav>
  </div>
  <div class="topbar-right">
    <span id="who" class="topbar-name"></span>
    <a class="settings-btn" href="settings.html" title="设置">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </a>
  </div>
</div>

<div class="page-main centered">
  <div class="col-wrap">
    <div class="col-header">
      <div style="display:flex; align-items:center;">
        <div class="title">我的收藏</div>
        <div class="count">共 <b id="collectionCount">0</b> 张卡</div>
      </div>
      <div class="actions">
        <button class="refresh" id="btnRefreshCollection">&#x21bb; 刷新</button>
        <a class="back" href="recruit.html" id="btnBack">返回招募</a>
      </div>
    </div>
    <div class="col-panel">
      <div class="my-grid" id="collectionGrid">
        <div class="empty" style="grid-column: 1 / -1;">加载中...</div>
      </div>
    </div>
  </div>
</div>

<!-- 抽屉 -->
<div class="drawer-backdrop" id="drawerBackdrop"></div>
<div class="drawer" id="cardDetailDrawer">
  <button class="drawer-close" id="drawerClose" title="关闭">&#215;</button>
  <img id="drawerImg" alt="卡图" />
  <h2 id="drawerName">--</h2>
  <div class="drawer-meta">张数：<b id="drawerCount">--</b></div>
  <div class="drawer-meta">品质：<b id="drawerRare">--</b></div>
  <button class="btn-primary" id="btnGiveToggle">赠 送</button>
  <div class="drawer-give-form" id="drawerGiveForm" style="display:none">
    <label>赠送给：</label>
    <input class="input" id="giveTargetUid" placeholder="请输入被赠送方UID" />
    <button class="btn-primary" id="btnGiveConfirm">赠 送</button>
    <div class="msg" id="giveMsg"></div>
  </div>
</div>

<div class="gate-overlay" id="gateLogin" style="display:none">
  <div class="gate-box">
    <h2>需先登录账号</h2>
    <div class="err" id="gateLoginErr"></div>
    <input class="input" id="gateLoginEmail" type="email" placeholder="邮箱" />
    <input class="input" id="gateLoginPwd" type="password" placeholder="密码" />
    <button id="btnGateLogin">登 录</button>
    <div class="meta">还没有账号? <a href="account.html">前往注册</a></div>
  </div>
</div>
<div class="gate-overlay" id="gateBind" style="display:none">
  <div class="gate-box">
    <h2>需先绑定公开招募 UID</h2>
    <div class="meta">将打开账号页面完成绑定, <a href="account.html" id="gateBindGo">前往</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="account.js"></script>
<script>
let API_BASE = KardsAccount.DEFAULT_API;
let UID = "";
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

let _collectionCache = null;
let _currentCards = [];
let _currentDrawerCard = null;
const CACHE_TTL_MS = 30000;

function showToast(msg, isErr) {
  const t = $("#toast"); t.textContent = msg;
  t.className = "toast show" + (isErr ? " err" : "");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.className = "toast", 2200);
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

async function apiPost(path, body) {
  const res = await fetch(API_BASE + path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body || {}) });
  return await res.json();
}

async function loadCollection(force) {
  if (!UID) return;
  const grid = $("#collectionGrid");
  if (!grid) return;
  if (!force && _collectionCache && (Date.now() - _collectionCache.ts) < CACHE_TTL_MS) {
    _renderCollection(_collectionCache.cards);
    return;
  }
  grid.innerHTML = '<div class="empty" style="grid-column: 1 / -1;">加载中...</div>';
  try {
    const resp = await apiPost("/kards/user_cards", { uid: String(UID) });
    if (resp.code === 401) { showToast("请重新登录", true); setTimeout(() => location.href = "account.html", 800); return; }
    if (resp.code !== 0 || !resp.data) {
      grid.innerHTML = '<div class="empty" style="grid-column: 1 / -1;">' + escapeHtml(resp.msg || "加载失败") + '</div>';
      return;
    }
    const cards = resp.data.cards || [];
    _collectionCache = { ts: Date.now(), cards };
    _renderCollection(cards);
  } catch (e) {
    grid.innerHTML = '<div class="empty" style="grid-column: 1 / -1;">网络错误: ' + escapeHtml(e.message) + '</div>';
  }
}

function _renderCollection(cards) {
  _currentCards = cards;
  const grid = $("#collectionGrid");
  $("#collectionCount").textContent = cards.reduce((s, c) => s + (c.count || 0), 0);
  if (cards.length === 0) {
    grid.innerHTML = '<div class="empty" style="grid-column: 1 / -1;">暂无卡牌</div>';
    return;
  }
  grid.innerHTML = cards.map(c =>
    '<div class="my-card" data-card-id="' + c.card_id + '">' +
    '<img src="data:image/png;base64,' + (c.image_base64 || "") + '" alt="' + escapeHtml(c.card_name || "") + '" />' +
    '<div class="name">' + escapeHtml(c.card_name || "--") + '</div>' +
    '<div class="count-badge">x' + (c.count || 0) + '</div>' +
    '</div>'
  ).join("");
}

function openCollectionCard(cardId) {
  const c = _currentCards.find(x => x.card_id === cardId);
  if (!c) return;
  _currentDrawerCard = c;
  $("#drawerName").textContent = c.card_name || "--";
  $("#drawerCount").textContent = c.count || 0;
  $("#drawerRare").textContent = c.rare || "--";
  const img = $("#drawerImg");
  if (c.image_base64) img.src = "data:image/png;base64," + c.image_base64;
  else img.removeAttribute("src");
  $("#drawerGiveForm").style.display = "none";
  $("#giveTargetUid").value = "";
  $("#giveMsg").textContent = "";
  $("#giveMsg").className = "msg";
  $("#cardDetailDrawer").classList.add("open");
  $("#drawerBackdrop").classList.add("open");
}
function closeDrawer() {
  $("#cardDetailDrawer").classList.remove("open");
  $("#drawerBackdrop").classList.remove("open");
}

document.addEventListener("click", (e) => {
  const card = e.target.closest("#collectionGrid .my-card");
  if (!card) return;
  const id = Number(card.dataset.cardId);
  if (id) openCollectionCard(id);
});

$("#drawerClose").addEventListener("click", closeDrawer);
$("#drawerBackdrop").addEventListener("click", closeDrawer);
$("#btnRefreshCollection").addEventListener("click", () => loadCollection(true));

$("#btnGiveToggle").addEventListener("click", () => {
  const form = $("#drawerGiveForm");
  form.style.display = (form.style.display === "none") ? "" : "none";
  if (form.style.display !== "none") $("#giveTargetUid").focus();
});

$("#btnGiveConfirm").addEventListener("click", async () => {
  const target = $("#giveTargetUid").value.trim();
  const msgEl = $("#giveMsg");
  msgEl.textContent = ""; msgEl.className = "msg";
  if (!target) { msgEl.className = "msg err"; msgEl.textContent = "请输入被赠送方 UID"; return; }
  if (!_currentDrawerCard) { msgEl.className = "msg err"; msgEl.textContent = "未选中卡牌"; return; }
  const btn = $("#btnGiveConfirm"); btn.disabled = true;
  try {
    const resp = await apiPost("/kards/give_trade", { uid: String(UID), target_uid: String(target), card_name: _currentDrawerCard.card_name });
    if (resp.code === 401) { showToast("请重新登录", true); setTimeout(() => location.href = "account.html", 800); return; }
    if (resp.code !== 0) { msgEl.className = "msg err"; msgEl.textContent = resp.msg || "赠送失败"; return; }
    showToast(resp.msg || "赠送请求已发送");
    closeDrawer();
    _collectionCache = null;
    loadCollection(true);
  } catch (e) {
    msgEl.className = "msg err"; msgEl.textContent = "网络错误: " + e.message;
  } finally { btn.disabled = false; }
});

async function initPage() {
  await KardsAccount.ensureSeed();
  const s = KardsAccount.loadSettings();
  API_BASE = s.apiBase;
  KardsAccount.initPageNav("recruit");

  const cur = KardsAccount.getCurrentAccount();
  if (!cur) { $("#gateLogin").style.display = "flex"; return; }
  if (!cur.uid) { $("#gateBind").style.display = "flex"; return; }
  UID = cur.uid;
  loadCollection();
}

document.addEventListener("visibilitychange", () => { if (!document.hidden && UID) loadCollection(true); });
window.addEventListener("focus", () => { if (UID) loadCollection(true); });

initPage();

// 登录后自动重新加载
const _gateObserver = setInterval(() => {
  const loginGate = $("#gateLogin");
  const bindGate = $("#gateBind");
  const c = KardsAccount.getCurrentAccount();
  if (!c) { if (loginGate.style.display !== "flex") loginGate.style.display = "flex"; UID = ""; return; }
  if (!c.uid) { loginGate.style.display = "none"; if (bindGate.style.display !== "flex") bindGate.style.display = "flex"; UID = ""; return; }
  if (loginGate) loginGate.style.display = "none";
  if (bindGate) bindGate.style.display = "none";
  if (UID !== c.uid) { UID = c.uid; loadCollection(true); }
}, 1000);
window.addEventListener("beforeunload", () => clearInterval(_gateObserver));
</script>

</body>
</html>
