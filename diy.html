<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>KARDS 限定寻访</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="theme.css">
<style>
  .page-main {
    margin-left: 110px; margin-top: 48px;
    min-height: calc(100vh - 48px);
    padding: 30px 40px;
  }
  .tabs { display: flex; gap: 30px; margin-bottom: 24px; border-bottom: 1px solid var(--panel-border); align-items: center; }
  .tab-spacer { flex: 1; }
  .tab-refresh {
    padding: 4px 14px; font-size: 13px; letter-spacing: 2px;
    color: var(--accent); background: transparent;
    border: 1px solid var(--accent); border-radius: 4px;
    cursor: pointer; transition: all .15s;
    margin-bottom: -1px;
  }
  .tab-refresh:hover { background: rgba(214,162,106,.12); }
  .tab-refresh:disabled { opacity: .5; cursor: wait; }
  .tab {
    padding: 10px 0; cursor: pointer; color: var(--text-dim); font-size: 18px;
    letter-spacing: 4px; border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* 鉴赏桌 两列布局 */
  .pane { display: none; }
  .pane.active { display: block; }
  .review-grid {
    display: grid; grid-template-columns: 520px 1fr; gap: 32px;
    height: 620px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border); border-radius: 6px; padding: 28px;
    overflow: hidden;
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
  }
  .card-stage {
    display: flex; align-items: center; justify-content: center;
    background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 6px;
    width: 480px; height: 480px;
    padding: 14px; flex-shrink: 0;
    perspective: 800px; cursor: pointer;
  }
  .card-stage img {
    /* max-width/height 给个明确上限, 防浏览器在数据 URL 加载完成前先用原尺寸撑开 */
    max-width: 100%; max-height: 100%;
    width: auto; height: auto;
    object-fit: contain; display: block;
    transform-origin: center center;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    will-change: transform;
    border-radius: 4px;
  }
  /* 鼠标悬停时: 略微放大 + 抬起阴影 */
  .card-stage:hover img {
    transform: scale(1.10);
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(214, 162, 106, 0.25);
  }
  .card-stage .placeholder { color: var(--slot-text); font-size: 14px; letter-spacing: 4px; text-align: center; }
  .card-stage .error { color: #e57373; font-size: 14px; text-align: center; }
  .info-pane { display: flex; flex-direction: column; }
  .sub-tabs { display: flex; gap: 14px; margin-bottom: 18px; }
  .sub-tab {
    padding: 6px 18px; cursor: pointer; color: var(--text-dim); font-size: 14px;
    letter-spacing: 2px; border: 1px solid var(--panel-border); border-radius: 4px;
    background: transparent;
  }
  .sub-tab.active { color: var(--accent); border-color: var(--accent); background: rgba(214,162,106,0.08); }
  .info-title { font-size: 28px; color: var(--text-bright); letter-spacing: 4px; margin-bottom: 20px; min-height: 38px; }
  .info-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .info-row { color: var(--text); font-size: 15px; letter-spacing: 1px; display: flex; gap: 10px; }
  .info-row .k { color: var(--text-dim); min-width: 72px; }
  .info-row .v { color: var(--text-bright); }
  .actions { margin-top: auto; display: flex; flex-direction: column; gap: 14px; }
  .react-row { display: flex; gap: 12px; }
  .react-btn {
    flex: 1; height: 60px;
    background: var(--btn-bg); color: var(--text);
    border: 1px solid var(--btn-border); border-radius: 4px;
    font-size: 18px; letter-spacing: 2px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .react-btn:hover:not(:disabled) { background: linear-gradient(#3a3a3f, #1f1f22); border-color: #6a6a72; }
  .react-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .react-btn .icon { font-size: 24px; }
  .react-btn .count { font-size: 13px; color: var(--text-dim); }
  .btn-primary {
    height: 52px;
    background: linear-gradient(#3a2e1a, #1a1410);
    color: #f0d6a0;
    border: 1px solid var(--accent);
    border-radius: 4px;
    font-size: 18px; letter-spacing: 8px; cursor: pointer;
  }
  .btn-primary:hover:not(:disabled) { background: linear-gradient(#4a3a20, #2a1f15); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-danger { color: #e57373; border-color: #6a2a2a; background: linear-gradient(#2c1414, #1a0e0e); }
  .btn-danger:hover:not(:disabled) { background: linear-gradient(#4a1f1f, #2a1212); border-color: #c64a4a; color: #fff; }

  /* 我的投稿 栅格 */
  .my-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
  }
  .my-card {
    background: var(--panel-bg);
    border: 1px solid var(--panel-border); border-radius: 6px; padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
    cursor: pointer; user-select: none;
    transition: border-color .15s, transform .15s, box-shadow .15s;
  }
  .my-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.4); }
  .my-card img { width: 100%; aspect-ratio: 2/3; object-fit: contain; background: var(--input-bg); border-radius: 4px; }
  .my-card .meta { color: var(--text); font-size: 13px; display: flex; justify-content: space-between; }
  .my-card .state { color: var(--accent); }
  .my-card .counts { color: var(--text-dim); font-size: 12px; display: flex; gap: 10px; }
  /* + 号占位卡: 全屏虚线边框 + 大加号 + 半透明, hover 提亮 */
  .my-card-add {
    aspect-ratio: 2/3; min-height: 220px;
    align-items: center; justify-content: center;
    border: 2px dashed var(--slot-border);
    background: rgba(20, 22, 26, 0.4);
    color: var(--text-dim);
    text-align: center;
  }
  .my-card-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(214,162,106,.05); }
  .my-card-add .add-icon { font-size: 56px; font-weight: 200; line-height: 1; }
  .my-card-add .add-label { font-size: 13px; letter-spacing: 6px; margin-top: 8px; }

  /* 鉴赏桌 提交模式: 空位 + 拖入提示 */
  .card-stage.drag-over { border-color: var(--accent); background: rgba(214,162,106,.08); }
  .card-stage .drop-hint {
    color: var(--slot-text); font-size: 14px; letter-spacing: 4px; text-align: center; padding: 0 20px;
    pointer-events: none;
  }
  .card-stage .drop-hint .big { font-size: 48px; color: var(--slot-text); line-height: 1; margin-bottom: 14px; }

  /* 提交模式: 隐藏 react-row / btnNext / btnDeleteThis, 显示 匿名/投稿/取消 */
  body.submit-mode .react-row,
  body.submit-mode #btnNext,
  body.submit-mode #btnDeleteThis,
  body.submit-mode .sub-tabs,
  body.submit-mode .info-title,
  body.submit-mode .info-list { display: none !important; }
  body.submit-mode #submitActions { display: flex !important; }
  body.submit-mode .info-pane { justify-content: flex-end; padding-bottom: 8px; }
  .submit-actions {
    display: none;
    flex-direction: column; gap: 12px;
    margin-top: auto;
  }
  .submit-actions .row { display: flex; gap: 10px; align-items: center; }
  .submit-actions .anon-row { font-size: 14px; color: var(--text); padding: 6px 4px; }
  .submit-actions .anon-row input { width: 16px; height: 16px; accent-color: var(--accent); margin-right: 8px; cursor: pointer; }
  .submit-actions .btn-row { display: flex; gap: 12px; }
  .submit-actions .btn-row button { flex: 1; height: 52px; }
  .btn-submit { background: linear-gradient(#3a2e1a, #1a1410); color: #f0d6a0; border: 1px solid var(--accent); border-radius: 4px; font-size: 18px; letter-spacing: 8px; cursor: pointer; }
  .btn-submit:hover:not(:disabled) { background: linear-gradient(#4a3a20, #2a1f15); }
  .btn-submit:disabled { opacity: .4; cursor: not-allowed; }
  .btn-cancel { background: linear-gradient(#2c2c30, #1a1a1c); color: #e6e6e6; border: 1px solid #4a4a50; border-radius: 4px; font-size: 18px; letter-spacing: 8px; cursor: pointer; }
  .btn-cancel:hover:not(:disabled) { background: linear-gradient(#3a3a3f, #1f1f22); }
  .empty { color: var(--text-dim); font-size: 14px; text-align: center; padding: 60px 0; }

  /* 门控 overlay */
  .gate-overlay {
    position: fixed; top: 48px; left: 110px; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .gate-box {
    width: 420px; padding: 30px 36px;
    background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 6px;
    text-align: center;
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
  }
  .gate-box h2 { color: var(--accent); letter-spacing: 4px; margin-bottom: 18px; font-size: 22px; }
  .gate-box .meta { color: var(--text-dim); font-size: 12px; margin-top: 14px; }
  .gate-box .meta a { color: var(--accent); text-decoration: none; }

  /* toast */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; background: rgba(0,0,0,0.85);
    border: 1px solid var(--accent); color: var(--text-bright);
    border-radius: 4px; z-index: 200; font-size: 13px;
    opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.err { border-color: #e57373; color: #ffb4b4; }
</style>
</head>
<body>

<div class="side-nav">
  <a class="slot" href="deck.html" data-page="deck">卡 组</a>

<div class="topbar">
  <div class="topbar-left">
    <nav class="topbar-nav">
      <a href="deck.html" data-page="deck">卡组</a>
      <a href="recruit.html" data-page="recruit">公开招募</a>
      <a href="diy.html" data-page="diy">限定寻访</a>
      <a href="search.html" data-page="search">搜索</a>

  <div class="topbar-right">

        </div>
        <div class="info-title" id="infoTitle"></div>

        <div class="actions">
          <div class="react-row">
            <button class="react-btn" id="btnLike" disabled>

  <!-- 我的投稿 -->

</div>

<div class="gate-overlay" id="gateLogin" style="display:none">
  <div class="gate-box">
    <h2>需先登录账号</h2>

</div>

    <h2>需先绑定限定寻访 QQ</h2>
    <div class="meta">将打开账号页面完成绑定, <a href="account.html" id="gateBindGo">前往</a></div>
    <div class="meta"><a href="javascript:void(0)" id="btnDismissBind" data-dismiss="gateBind">继续浏览 (不绑定)</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="account.js"></script>
<script>
const $ = (s) => document.querySelector(s);
let API_BASE = KardsAccount.DEFAULT_DIY_API;
let currentMode = "random";
let currentCard = null;
let reactUsed = new Set(); // 本地防重 (前端标记)

function showToast(msg, isErr) {
  const t = $("#toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr ? " err" : "");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.className = "toast", 2200);
}

// signal 可选, 用于 AbortController 取消上一次未完成的请求
async function apiGet(path, signal) {
  const res = await fetch(API_BASE + path, { method: "GET", signal });
  return await res.json();
}
async function apiPost(path, body, signal) {
  const res = await fetch(API_BASE + path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body || {}),
    signal
  });
  return await res.json();
}

// ===== tab 切换 =====
function showTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === name));
  document.querySelectorAll(".pane").forEach(p => p.classList.toggle("active", p.dataset.pane === name));
  // 刷新按钮: 仅“我的投稿” tab 可见
  const refreshBtn = document.getElementById("btnRefreshMine");
  if (refreshBtn) refreshBtn.style.display = (name === "mine") ? "" : "none";
  if (name === "mine") {
    loadMine();
  } else if (name === "review") {
    // 切到鉴赏桌 tab 时, 如果还没显示卡, 自动抽一张 (优化体验, 不用每次手动点)
    if (!currentCard) nextCard();
  }
}
document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => showTab(t.dataset.tab)));

// ===== sub-tab (全部/联动) =====
document.querySelectorAll(".sub-tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".sub-tab").forEach(x => x.classList.toggle("active", x === t));
    currentMode = t.dataset.mode;
  });
});

// ===== 卡牌展示 =====
function renderCard(card) {
  currentCard = card;
  reactUsed.clear();
  const stage = $("#cardStage");
  if (!card || !card.image_base64) {
    stage.innerHTML = '<div class="placeholder">点击"再来一张"获取 DIY 卡牌</div>';
  } else {
    stage.innerHTML = "";
    const img = document.createElement("img");
    img.src = card.image_base64;
    img.alt = "DIY 卡牌";
    // 鼠标移动 -> 跟随位置倾斜 (视觉优化: 让卡牌像实体卡一样能"看"一下)
    img.addEventListener("mousemove", (e) => {
      const rect = img.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width  - 0.5;  // -0.5 ~ 0.5
      const y = (e.clientY - rect.top)  / rect.height - 0.5;
      const maxAngle = 30;  // 倾斜角度上限 (用户要求更大, 再放大一点)
      img.style.transform = `scale(1.10) rotateX(${(-y * maxAngle).toFixed(2)}deg) rotateY(${(x * maxAngle).toFixed(2)}deg)`;
    });
    img.addEventListener("mouseleave", () => {
      img.style.transform = "";
    });
    stage.appendChild(img);
  }

  // 标题 (没有合适字段就空)
  $("#infoTitle").textContent = "";

  // 字段列表 - 后端返回什么就显示什么
  const list = $("#infoList");
  list.innerHTML = "";
  const FIELDS = [
    ["card_id",   "ID"],
    ["author",    "作者"],
    ["submitted_at", "发布时间"],
    ["state",     "状态"]
  ];
  for (const [k, label] of FIELDS) {
    if (card && card[k] != null && card[k] !== "") {
      const row = document.createElement("div");
      row.className = "info-row";
      row.innerHTML = `<span class="k">— ${label}</span><span class="v">${escapeHtml(String(card[k]))}</span>`;
      list.appendChild(row);
    }
  }

  $("#cntLike").textContent = card && card.likes != null ? card.likes : 0;
  $("#cntDislike").textContent = card && card.dislikes != null ? card.dislikes : 0;
  $("#cntCandy").textContent = card && card.candies != null ? card.candies : 0;

  const enabled = !!(card && card.card_id);
  $("#btnLike").disabled = !enabled;
  $("#btnDislike").disabled = !enabled;
  $("#btnCandy").disabled = !enabled;

  // 删除该卡按钮: 仅当当前卡为本人所拥有时显示
  const btnDel = $("#btnDeleteThis");
  if (btnDel) {
    const myQq = String(KardsAccount.getDiyQQ() || "");
    const owner = card && card.owner_qq != null ? String(card.owner_qq) : "";
    const isMine = myQq && owner && myQq === owner;
    btnDel.style.display = isMine ? "" : "none";
    btnDel.disabled = !isMine;
  }
}

// 从“我的投稿”左键点击进入：切到鉴赏桌 tab + 展示该卡
let _openMyCardCtrl = null;
async function openMyCard(cardId) {
  if (!cardId) return;
  if (_openMyCardCtrl) { try { _openMyCardCtrl.abort(); } catch (e) {} }
  _openMyCardCtrl = (typeof AbortController !== "undefined") ? new AbortController() : null;
  const signal = _openMyCardCtrl ? _openMyCardCtrl.signal : undefined;
  showTab("review");
  $("#cardStage").innerHTML = '<div class="placeholder">加载中...</div>';
  try {
    const resp = await apiGet("/diy/card/" + encodeURIComponent(String(cardId)), signal);
    if (!resp || resp.code !== 0 || !resp.data) {
      $("#cardStage").innerHTML = '<div class="error">' + (resp && resp.msg ? escapeHtml(resp.msg) : "后端无响应") + '</div>';
      renderCard(null);
      return;
    }
    renderCard(resp.data);
  } catch (e) {
    if (e && e.name === "AbortError") return;
    $("#cardStage").innerHTML = '<div class="error">无法连接后端: ' + escapeHtml(e.message) + '</div>';
    renderCard(null);
  }
}

// 右键 -> 弹确认 -> 调 /diy/delete
async function confirmDeleteMyCard(cardId) {
  if (!cardId) return;
  if (!window.confirm("是否删除该卡牌？该操作不可撤销")) return;
  await doDeleteMyCard(cardId);
}

// 鉴赏桌右侧“删除该卡”按钮: 也走同一个确认 -> 删除流程
async function doDeleteMyCard(cardId) {
  if (!cardId) return;
  if (!window.confirm("是否删除该卡牌？该操作不可撤销")) return;
  const uid = KardsAccount.getDiyQQ();
  if (!uid) { showToast("未绑定限定寻访 QQ", true); return; }
  try {
    const resp = await apiPost("/diy/delete", { uid: String(uid), card_id: cardId });
    if (resp.code === 0) {
      showToast(resp.msg || "已删除");
      // 删成功: 立即使缓存失效, 下次 loadMine 会强制重拉
      _invalidateMineCache(uid);
      // 刷新“我的投稿”列表
      loadMine(true);
      // 如果当前鉴赏桌展示的是这张卡, 清空展示
      if (currentCard && String(currentCard.card_id) === String(cardId)) {
        $("#cardStage").innerHTML = '<div class="placeholder">该卡牌已删除</div>';
        renderCard(null);
      }
    } else {
      showToast(resp.msg || "删除失败", true);
    }
  } catch (e) {
    showToast("网络错误: " + e.message, true);
  }
}
$("#btnDeleteThis").addEventListener("click", () => {
  if (currentCard && currentCard.card_id) doDeleteMyCard(currentCard.card_id);
});

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// ===== 投稿模式 =====
// 点“+”卡 → enterSubmitMode() → 身体加 body.submit-mode,
// 鉴赏桌左侧 cardStage 变为空位 + drop-hint, 右侧 actions 变为 匿名复选 + 投稿/取消 两个按钮.
// 用户拖图到 cardStage 上 / 或点击空位弹 filePicker 选图, 选完后 cardStage 预览该图.
// 点投稿 → POST /diy/submit {uid, image_base64, anonymous}. 成功 → 退出投稿模式 + loadMine(true).

let _submitImageDataUrl = null;  // 当前选中的图 (data URL, 含 data:image/...;base64,)

function _enterSubmitModeRenderEmpty() {
  document.body.classList.add("submit-mode");
  $("#cardStage").innerHTML = '<div class="drop-hint"><div class="big">+</div>拖入卡牌图片或点击选择</div>';
  _submitImageDataUrl = null;
  const btn = $("#btnDoSubmit");
  if (btn) btn.disabled = true;
}

function _renderSubmitPreview(dataUrl) {
  $("#cardStage").innerHTML = "";
  const img = document.createElement("img");
  img.src = dataUrl;
  img.alt = "预览";
  img.style.maxWidth = "100%";
  img.style.maxHeight = "100%";
  img.style.objectFit = "contain";
  img.style.borderRadius = "4px";
  $("#cardStage").appendChild(img);
  _submitImageDataUrl = dataUrl;
  const btn = $("#btnDoSubmit");
  if (btn) btn.disabled = false;
}

function enterSubmitMode() {
  // 跳到鉴赏桌 tab + 进入投稿模式
  showTab("review");
  _enterSubmitModeRenderEmpty();
}

// 退出投稿模式: 清空选中, 隐藏提交按钮区, 恢复鉴赏桌默认
function _exitSubmitMode() {
  document.body.classList.remove("submit-mode");
  _submitImageDataUrl = null;
  // 如果这时没卡在展示, 抽一张
  if (!currentCard) nextCard();
}

// 点空位 → 弹 filePicker
$("#cardStage").addEventListener("click", (e) => {
  if (!document.body.classList.contains("submit-mode")) return;
  // 如果已选了图, 点击允许重选
  $("#filePicker").click();
});

// 拖拽高亮 + 放下接受文件
const _stage = $("#cardStage");
_stage.addEventListener("dragover", (e) => {
  if (!document.body.classList.contains("submit-mode")) return;
  e.preventDefault();
  _stage.classList.add("drag-over");
});
_stage.addEventListener("dragleave", (e) => {
  if (!_stage.contains(e.relatedTarget)) _stage.classList.remove("drag-over");
});
_stage.addEventListener("drop", async (e) => {
  if (!document.body.classList.contains("submit-mode")) return;
  e.preventDefault();
  _stage.classList.remove("drag-over");
  const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (!file) return;
  if (!file.type.startsWith("image/")) { showToast("请选择图片文件", true); return; }
  // 限制 5MB (与后端 MAX_IMAGE_SIZE 一致, 超过提前报错)
  if (file.size > 5 * 1024 * 1024) { showToast("图牌过大 (不超过 5MB)", true); return; }
  const dataUrl = await _fileToDataUrl(file);
  _renderSubmitPreview(dataUrl);
});

$("#filePicker").addEventListener("change", async (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  if (!file.type.startsWith("image/")) { showToast("请选择图片文件", true); return; }
  if (file.size > 5 * 1024 * 1024) { showToast("图牌过大 (不超过 5MB)", true); return; }
  const dataUrl = await _fileToDataUrl(file);
  _renderSubmitPreview(dataUrl);
  e.target.value = "";  // 重置, 下次选同一个文件也能触发 change
});

function _fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error("读取文件失败"));
    r.readAsDataURL(file);
  });
}

// 取出 base64 部分 (后端要求纯 base64, 不要 data: 前缀)
function _stripDataUrlPrefix(dataUrl) {
  const m = /^data:[^;]+;base64,(.*)$/.exec(dataUrl || "");
  return m ? m[1] : dataUrl;
}

$("#btnCancelSubmit").addEventListener("click", () => {
  _exitSubmitMode();
  showToast("已取消");
});

$("#btnDoSubmit").addEventListener("click", async () => {
  if (!_submitImageDataUrl) return;
  const uid = KardsAccount.getDiyQQ();
  if (!uid) { showToast("未绑定限定寻访 QQ", true); return; }
  const anonymous = !!$("#chkAnonymous").checked;
  const btn = $("#btnDoSubmit");
  btn.disabled = true;
  try {
    const resp = await apiPost("/diy/submit", {
      uid: String(uid),
      image_base64: _stripDataUrlPrefix(_submitImageDataUrl),
      anonymous: anonymous
    });
    if (resp.code === 0) {
      showToast(resp.msg || "投稿成功, 待审核");
      _exitSubmitMode();
      // 刷新列表
      _invalidateMineCache(uid);
      loadMine(true);
    } else {
      showToast(resp.msg || "投稿失败", true);
      btn.disabled = false;
    }
  } catch (e) {
    showToast("网络错误: " + e.message, true);
    btn.disabled = false;
  }
});

// 竞态保护: 每次点击取消上一次未完成的请求, 避免后回包覆盖先回包
let nextCardCtrl = null;
async function nextCard() {
  if (nextCardCtrl) { try { nextCardCtrl.abort(); } catch (e) {} }
  nextCardCtrl = (typeof AbortController !== "undefined") ? new AbortController() : null;
  const signal = nextCardCtrl ? nextCardCtrl.signal : undefined;
  $("#cardStage").innerHTML = '<div class="placeholder">加载中...</div>';
  try {
    const resp = await apiGet("/diy/" + currentMode, signal);
    if (!resp || resp.code !== 0 || !resp.data) {
      $("#cardStage").innerHTML = '<div class="error">' + (resp && resp.msg ? escapeHtml(resp.msg) : "后端无响应") + '</div>';
      renderCard(null);
      return;
    }
    renderCard(resp.data);
  } catch (e) {
    if (e && e.name === "AbortError") return;  // 被新一次点击取消, 静默
    $("#cardStage").innerHTML = '<div class="error">无法连接后端: ' + escapeHtml(e.message) + '</div>';
    renderCard(null);
  }
}
$("#btnNext").addEventListener("click", nextCard);

async function doReact(action) {
  if (!currentCard || !currentCard.card_id) return;
  if (reactUsed.has(action)) { showToast("已评价过该卡牌", true); return; }
  const uid = KardsAccount.getDiyQQ();
  if (!uid) { showToast("未绑定限定寻访 QQ", true); return; }
  // 乐观更新
  const map = { like: "cntLike", dislike: "cntDislike", candy: "cntCandy" };
  const cnt = $("#" + map[action]);
  const old = parseInt(cnt.textContent, 10) || 0;
  cnt.textContent = old + 1;
  reactUsed.add(action);
  try {
    const resp = await apiPost("/diy/react", { uid: String(uid), card_id: currentCard.card_id, action });
    if (resp.code !== 0) {
      cnt.textContent = old;
      reactUsed.delete(action);
      showToast(resp.msg || "评价失败", true);
    } else {
      showToast(resp.msg || "已评价");
    }
  } catch (e) {
    cnt.textContent = old;
    reactUsed.delete(action);
    showToast("网络错误: " + e.message, true);
  }
}
$("#btnLike").addEventListener("click", () => doReact("like"));
$("#btnDislike").addEventListener("click", () => doReact("dislike"));
$("#btnCandy").addEventListener("click", () => doReact("candy"));

// ===== 我的投稿 =====
// ===== 我的投稿 缓存 =====
// 30 分钟内不重新请求后端 (实际变化频率低, 省一次序列查 + N 张图 base64 读盘)
// 为了避免带权限不同的账号谈出问题, 缓存按 uid 分隔
const MINE_CACHE_TTL_MS = 30 * 60 * 1000;
const _mineCache = new Map();  // uid -> { ts, html, hasData }

function _invalidateMineCache(uid) {
  if (uid) _mineCache.delete(String(uid));
  else _mineCache.clear();
}

function _renderMineCards(cards, wrap) {
  if (cards.length === 0) { wrap.innerHTML = '<div class="empty">暂无投稿</div>'; return; }
  const grid = document.createElement("div");
  grid.className = "my-grid";
  cards.forEach(c => {
    const card = document.createElement("div");
    card.className = "my-card";
    card.dataset.cardId = c.card_id || "";
    card.title = "左键查看 / 右键删除";
    card.innerHTML = `
      ${c.image_base64 ? `<img src="${c.image_base64}" alt="card">` : '<div style="aspect-ratio:2/3;background:#0a0a0c;display:flex;align-items:center;justify-content:center;color:#555">无图</div>'}
      <div class="meta"><span>ID ${c.card_id || "-"}</span><span class="state">${escapeHtml(c.state || "未知")}</span></div>
      <div class="counts"><span>👍 ${c.likes || 0}</span><span>👎 ${c.dislikes || 0}</span><span>🍬 ${c.candies || 0}</span></div>
    `;
    // 左键 → 切到鉴赏桌并展示该卡
    card.addEventListener("click", () => openMyCard(c.card_id));
    // 右键 → 弹确认, 确认后调 /diy/delete
    card.addEventListener("contextmenu", (e) => { e.preventDefault(); confirmDeleteMyCard(c.card_id); });
    grid.appendChild(card);
  });
  // 末尾加 + 号占位卡 (点击进入投稿模式)
  const addCard = document.createElement("div");
  addCard.className = "my-card my-card-add";
  addCard.title = "点击进入投稿模式";
  addCard.dataset.add = "1";
  addCard.innerHTML = '<div class="add-icon">+</div><div class="add-label">投稿</div>';
  addCard.addEventListener("click", () => enterSubmitMode());
  grid.appendChild(addCard);
  wrap.innerHTML = "";
  wrap.appendChild(grid);
}

function _formatMineAge(ts) {
  if (!ts) return "";
  const age = Math.max(0, Date.now() - ts);
  if (age < 60 * 1000) return "刚刚";
  if (age < 60 * 60 * 1000) return Math.floor(age / 60000) + " 分钟前";
  return Math.floor(age / 3600000) + " 小时前";
}

function _appendMineFooter(hasData) {
  // 在列表下方加一行小记录: 什么时候过的 + 资源提示
  const wrap = $("#myContent");
  const cache = _mineCache.get(String(KardsAccount.getDiyQQ() || ""));
  if (!cache || !hasData) return;
  const foot = document.createElement("div");
  foot.style.cssText = "color:#666;font-size:12px;padding:18px 0 4px;text-align:center";
  foot.textContent = "最近加载: " + _formatMineAge(cache.ts) + " (30 分钟内不重请, 可点右上角“刷新”)";
  wrap.appendChild(foot);
}

// in-flight 锁 + 缓存: 切 tab / 切回页面并发触发时, 已发未回的请求直接复用同一个 promise
// force=true 时强制绕过缓存重拉 (用于刷新按钮)
let _loadMineInflight = null;
function loadMine(force) {
  const wrap = $("#myContent");
  const uid = KardsAccount.getDiyQQ();
  if (!uid) { wrap.innerHTML = '<div class="empty">未绑定限定寻访 QQ</div>'; _invalidateMineCache(); return; }

  // 缓存命中: 同 uid + 未过期 + 不强制 -> 直接复用
  if (!force) {
    const c = _mineCache.get(uid);
    if (c && (Date.now() - c.ts) < MINE_CACHE_TTL_MS) {
      if (c.hasData) {
        wrap.innerHTML = c.html;
        // 绑事件 (原来的 listener 随 innerHTML 别除了)
        _bindMineCardsEvents();
        _appendMineFooter(true);
      } else {
        wrap.innerHTML = '<div class="empty">暂无投稿</div>';
        _appendMineFooter(false);
      }
      return;
    }
  }

  if (_loadMineInflight) return _loadMineInflight;
  _loadMineInflight = (async () => {
    wrap.innerHTML = '<div class="empty">加载中...</div>';
    try {
      const resp = await apiPost("/diy/user_cards", { uid: String(uid) });
      if (resp.code !== 0 || !resp.data) {
        wrap.innerHTML = '<div class="empty">' + (resp.msg ? escapeHtml(resp.msg) : "加载失败") + '</div>';
        _invalidateMineCache(uid);
        return;
      }
      const cards = resp.data.cards || [];
      if (cards.length === 0) {
        wrap.innerHTML = '<div class="empty">暂无投稿</div>';
        _mineCache.set(uid, { ts: Date.now(), html: "", hasData: false });
        _appendMineFooter(false);
        return;
      }
      // 先渲染, 再把最终 HTML 快照存进缓存 (不会丢事件, 因为事件是 _renderMineCards 里面动态绑的, 复用时重新 _bindMineCardsEvents)
      const tmp = document.createElement("div");
      _renderMineCards(cards, tmp);
      wrap.innerHTML = "";
      wrap.appendChild(tmp.firstElementChild || tmp);  // 把 my-grid 复制过来
      _mineCache.set(uid, { ts: Date.now(), html: wrap.innerHTML, hasData: true });
      _appendMineFooter(true);
    } catch (e) {
      wrap.innerHTML = '<div class="empty">网络错误: ' + escapeHtml(e.message) + '</div>';
      _invalidateMineCache(uid);
    } finally {
      _loadMineInflight = null;
    }
  })();
  return _loadMineInflight;
}

// 从缓存 HTML 里重新绑 .my-card 的事件 (innerHTML 会别除原先的 listener)
function _bindMineCardsEvents() {
  const uid = KardsAccount.getDiyQQ();
  if (!uid) return;
  document.querySelectorAll("#myContent .my-card").forEach(cardEl => {
    if (cardEl.dataset.bound === "1") return;  // 防重复绑
    cardEl.dataset.bound = "1";
    if (cardEl.dataset.add === "1") {
      // + 号占位卡: 只能点击进入投稿模式, 不能查看 / 删除
      cardEl.addEventListener("click", () => enterSubmitMode());
      return;
    }
    const cid = cardEl.dataset.cardId;
    if (!cid) return;
    cardEl.addEventListener("click", () => openMyCard(cid));
    cardEl.addEventListener("contextmenu", (e) => { e.preventDefault(); confirmDeleteMyCard(cid); });
  });
}

// 刷新按钮: 强制绕过缓存重拉
async function refreshMine() {
  const btn = $("#btnRefreshMine");
  if (btn) btn.disabled = true;
  try {
    await loadMine(true);
  } finally {
    if (btn) btn.disabled = false;
  }
}
$("#btnRefreshMine").addEventListener("click", refreshMine);

async function refreshOnVisible() {
  if (document.hidden) return;
  const cur = KardsAccount.getCurrentAccount();

  // review tab 仅在已有卡时刷新计数/详情, 避免无意义请求
  if (activeTab && activeTab.dataset.tab === "review" && currentCard) {
    // 不重置卡牌, 不主动刷; 用户可点"再来一张"
  }
}
document.addEventListener("visibilitychange", refreshOnVisible);
window.addEventListener("pageshow", refreshOnVisible);
window.addEventListener("focus", refreshOnVisible);

initGate();

    const g = document.getElementById(id);
